<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline Context Manager Cloud Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .timeline-line { position: absolute; left: 7px; top: 0; bottom: 0; width: 2px; background-color: #e2e8f0; }
        .timeline-dot { position: absolute; left: 0; top: 6px; width: 16px; height: 16px; background-color: #0ea5e9; border: 3px solid #fff; border-radius: 50%; z-index: 10; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-900 pb-12">
    <!-- Login Overlay -->
    <div id="loginOverlay" class="fixed inset-0 bg-white z-[200] flex items-center justify-center p-6 hidden">
        <div class="max-w-sm w-full text-center">
            <h1 class="text-3xl font-black tracking-tighter text-slate-800 mb-2">Timeline Since</h1>
            <p class="text-sm text-slate-500 mb-8 leading-relaxed">複数端末での同期と、安全なデータ管理のためにGoogleでログインしてください。</p>
            <button onclick="signInWithGoogle()" class="w-full bg-white border-2 border-slate-200 text-slate-700 py-4 rounded-2xl font-bold shadow-sm hover:bg-slate-50 transition-all flex items-center justify-center gap-3 active:scale-95">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Googleで開始
            </button>
        </div>
    </div>

    <!-- Main Container -->
    <div id="appRoot" class="hidden">
        <div class="max-w-xl mx-auto px-4 py-6">
            <header class="mb-6">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h1 class="text-2xl font-black tracking-tighter text-slate-800">Timeline Since</h1>
                        <p class="text-xs text-slate-500 font-medium italic" id="syncStatus">Syncing...</p>
                    </div>
                    <button onclick="handleLogout()" class="text-[10px] text-slate-400 hover:text-red-500 underline">ログアウト</button>
                </div>

                <div class="flex gap-2 items-center mb-6">
                    <button onclick="openModal('timer')" class="flex-1 bg-sky-500 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-sky-100 hover:bg-sky-600 active:scale-[0.98] transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
                        新規作成
                    </button>
                    <button onclick="exportCSV()" class="p-3 bg-slate-800 text-white rounded-xl shadow-lg shadow-slate-200 hover:bg-slate-700 active:scale-95 transition-all" title="CSV出力">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    </button>
                    <label class="p-3 bg-white border border-slate-200 text-slate-500 rounded-xl shadow-sm hover:bg-slate-50 active:scale-95 transition-all cursor-pointer" title="Excel(CSV)読込">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                        <input type="file" class="hidden" accept=".csv" onchange="importSpreadsheetCSV(event)">
                    </label>
                    <button onclick="exportJSON()" class="p-3 bg-white border border-slate-200 text-slate-500 rounded-xl shadow-sm hover:bg-slate-50 active:scale-95 transition-all" title="JSONバックアップ">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                    </button>
                    <label class="p-3 bg-white border border-slate-200 text-slate-500 rounded-xl shadow-sm hover:bg-slate-50 active:scale-95 transition-all cursor-pointer" title="JSON復元">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l4 4m-4-4h12"/></svg>
                        <input type="file" class="hidden" accept=".json" onchange="importJSON(event)">
                    </label>
                </div>

                <div class="flex items-center justify-between mb-2">
                    <div id="categoryTabs" class="flex gap-2 overflow-x-auto no-scrollbar flex-1 mr-2"></div>
                    <select onchange="updateSort(this.value)" id="sortSelector" class="bg-slate-50 border border-slate-200 text-slate-500 text-[10px] font-bold rounded-lg px-2 py-1 outline-none focus:ring-1 focus:ring-sky-500">
                        <option value="recent">直近日時順</option>
                        <option value="modified">最終記録順</option>
                        <option value="created">作成順</option>
                        <option value="name">名前順</option>
                    </select>
                </div>
            </header>
            <div id="mainContainer" class="space-y-6"></div>
        </div>
    </div>

    <!-- Modals -->
    <div id="timerModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-[100] backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl">
            <h3 class="text-lg font-bold mb-4" id="timerModalTitle">タイマー設定</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">カテゴリ</label>
                    <input type="text" id="newTimerCategory" list="existingCategories" class="w-full border-b-2 border-slate-100 py-2 outline-none text-sm bg-transparent">
                    <datalist id="existingCategories"></datalist>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">タイトル</label>
                    <input type="text" id="newTimerTitle" class="w-full border-b-2 border-slate-100 py-2 outline-none text-sm">
                </div>
                <div id="initialDateGroup">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">初回日時</label>
                    <div class="flex gap-2 items-center">
                        <input type="datetime-local" id="newTimerInitialDate" class="flex-1 border-b-2 border-slate-100 py-2 outline-none text-sm">
                        <button type="button" class="px-3 py-1 bg-slate-100 text-slate-600 rounded-lg text-xs font-bold" onclick="document.activeElement.blur()">決定</button>
                    </div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mt-2 block">メモ</label>
                    <textarea id="newTimerInitialMemo" class="w-full border rounded-lg p-2 mt-1 text-sm h-16 resize-none outline-none border-slate-200" placeholder="空欄可"></textarea>
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="closeModal('timer')" class="flex-1 py-3 text-slate-500 font-bold">中止</button>
                    <button id="timerSubmitBtn" onclick="createTimer()" class="flex-1 py-3 bg-slate-800 text-white rounded-xl font-bold">保存</button>
                </div>
            </div>
        </div>
    </div>

    <div id="logModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-[100] backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl">
            <h3 class="text-lg font-bold mb-4" id="logModalTitle">履歴追加</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">日時</label>
                    <div class="flex gap-2 items-center">
                        <input type="datetime-local" id="newLogDate" class="flex-1 border-b-2 border-slate-100 py-2 outline-none text-sm">
                        <button type="button" class="px-3 py-1 bg-slate-100 text-slate-600 rounded-lg text-xs font-bold" onclick="document.activeElement.blur()">決定</button>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">メモ</label>
                    <textarea id="newLogMemo" class="w-full border rounded-lg p-2 mt-1 text-sm h-24 resize-none outline-none border-slate-200"></textarea>
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="closeModal('log')" class="flex-1 py-3 text-slate-500 font-bold">中止</button>
                    <button id="logSubmitBtn" onclick="addLog()" class="flex-1 py-3 bg-sky-50 text-sky-600 font-bold rounded-xl border border-sky-100">確定</button>
                </div>
            </div>
        </div>
    </div>

    <div id="deleteModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-[150] backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-xs p-6 shadow-2xl text-center">
            <div class="w-12 h-12 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </div>
            <h3 class="text-lg font-bold text-slate-800 mb-2" id="deleteTargetName">データの削除</h3>
            <p class="text-xs text-slate-400 mb-6 leading-relaxed">この操作は取り消せません。本当に削除してよろしいですか？</p>
            <div class="flex gap-2">
                <button onclick="closeModal('delete')" class="flex-1 py-3 text-slate-500 font-bold">中止</button>
                <button id="deleteExecuteBtn" class="flex-1 py-3 bg-red-500 text-white rounded-xl font-bold active:scale-95 transition">削除する</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot, query } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // ==========================================
        // Firebase Config: timer-d7f73
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyC6TKgRNRFhm023uAtTnXyJXHcQtO4i4nA",
            authDomain: "timer-d7f73.firebaseapp.com",
            projectId: "timer-d7f73",
            storageBucket: "timer-d7f73.firebasestorage.app",
            messagingSenderId: "779981072804",
            appId: "1:779981072804:web:62bcfad1b1bbe392993931",
            measurementId: "G-3W7X6BDZRG"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        // Logic Update: Force account selection prompt to allow switching Google accounts
        provider.setCustomParameters({ prompt: 'select_account' });

        const currentAppId = typeof __app_id !== 'undefined' ? __app_id : 'since-timer-cloud';

        let data = [];
        let user = null;
        let selectedCategory = 'すべて';
        let sortMode = 'recent'; 
        let currentEditingTimerId = null;
        let currentEditingLogId = null;

        onAuthStateChanged(auth, async (u) => {
            if (u && !u.isAnonymous) {
                user = u;
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('appRoot').classList.remove('hidden');
                setupRealtimeSync();
            } else {
                if (u && u.isAnonymous) await signOut(auth);
                user = null;
                document.getElementById('appRoot').classList.add('hidden');
                document.getElementById('loginOverlay').classList.remove('hidden');
            }
        });

        window.signInWithGoogle = async () => {
            try { await signInWithPopup(auth, provider); }
            catch (err) { alert("ログイン失敗: " + err.message); }
        };

        window.handleLogout = () => { if(confirm("ログアウトしますか？")) signOut(auth); };

        function setupRealtimeSync() {
            const q = query(collection(db, 'artifacts', currentAppId, 'users', user.uid, 'timers'));
            onSnapshot(q, (snapshot) => {
                data = snapshot.docs.map(doc => ({ docId: doc.id, ...doc.data() }));
                renderCategories(); render();
            });
        }

        function formatRelativeTime(ms) {
            const diff = Date.now() - ms;
            const abs = Math.abs(diff);
            const totalDays = Math.floor(abs / 86400000);
            const suffix = diff >= 0 ? "前" : "後";

            if (totalDays >= 365) {
                const y = Math.floor(totalDays / 365);
                const remainingAfterYears = totalDays % 365;
                const m = Math.floor(remainingAfterYears / 30.44);
                const d = Math.floor(remainingAfterYears % 30.44);
                return { text: `${y}年${m}ヶ月${d}日${suffix}`, isFuture: diff < 0 };
            }
            if (totalDays >= 30) {
                const m = Math.floor(totalDays / 30.44);
                const d = Math.floor(totalDays % 30.44);
                return { text: `${m}ヶ月${d}日${suffix}`, isFuture: diff < 0 };
            }
            if (totalDays >= 1) return { text: `${totalDays}日${suffix}`, isFuture: diff < 0 };
            const hours = Math.floor(abs / 3600000);
            if (hours >= 1) return { text: `${hours}時間${suffix}`, isFuture: diff < 0 };
            const mins = Math.floor(abs / 60000);
            if (mins >= 1) return { text: `${mins}分${suffix}`, isFuture: diff < 0 };
            return { text: "たった今", isFuture: diff < 0 };
        }

        function calculateInterval(currentMs, prevMs) {
            if (!prevMs) return null;
            const diff = Math.abs(currentMs - prevMs);
            const totalDays = Math.floor(diff / 86400000);
            const months = Math.floor(totalDays / 30.44);
            const days = Math.floor(totalDays % 30.44);
            let res = "前回から";
            if (months > 0) res += months + "ヶ月";
            res += days + "日";
            return res;
        }

        window.importSpreadsheetCSV = async (e) => {
            const f = e.target.files[0]; if (!f) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const buffer = ev.target.result;
                let text = new TextDecoder("utf-8").decode(buffer);
                if (text.includes('\uFFFD')) text = new TextDecoder("shift-jis").decode(buffer);
                const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
                for (const line of lines) {
                    const cols = line.split(",").map(c => c.trim().replace(/^"|"$/g, ''));
                    if (cols.length < 3) continue;
                    const cat = cols[0] || "未分類", title = cols[1], ds = cols[2], ts = new Date(ds).getTime();
                    if (!title || isNaN(ts)) continue;
                    let timer = data.find(t => t.title === title && t.category === cat);
                    if (timer) {
                        if (!timer.logs.some(l => Math.abs(l.timestamp - ts) < 1000)) {
                            timer.logs.push({ id: Date.now() + Math.random(), timestamp: ts, memo: cols[3] || "" });
                            timer.logs.sort((a,b) => b.timestamp - a.timestamp);
                            await updateDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'timers', timer.id), { logs: timer.logs });
                        }
                    } else {
                        const nid = (Date.now() + Math.random()).toString();
                        const nt = { id: nid, title, category: cat, isExpanded: false, logs: [{ id: Date.now() + Math.random(), timestamp: ts, memo: cols[3] || "" }] };
                        await setDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'timers', nid), nt);
                    }
                }
                alert('統合完了');
            };
            reader.readAsArrayBuffer(f);
        };

        window.importJSON = async (e) => {
            const f = e.target.files[0]; if (!f || !confirm("クラウド上のデータへ追加・統合されます。よろしいですか？")) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    const imported = JSON.parse(ev.target.result);
                    if (Array.isArray(imported)) {
                        for (const timer of imported) {
                            const docId = (timer.id || Date.now() + Math.random()).toString();
                            await setDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'timers', docId), timer);
                        }
                        alert('JSONデータの復旧が完了しました。');
                    }
                } catch (err) { alert('読み込みに失敗しました。'); }
            };
            reader.readAsText(f);
        };

        window.openModal = (type, id = null, logId = null) => {
            document.getElementById(`${type}Modal`).style.display = 'flex';
            currentEditingTimerId = id; currentEditingLogId = logId;
            const now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            const ds = now.toISOString().slice(0, 16);
            if (type === 'timer') {
                updateCategoryList();
                if (id) {
                    const t = data.find(t => t.id === id.toString());
                    document.getElementById('newTimerTitle').value = t.title; document.getElementById('newTimerCategory').value = t.category;
                    document.getElementById('initialDateGroup').style.display = "none";
                    document.getElementById('timerSubmitBtn').setAttribute('onclick', 'updateTimer()');
                } else {
                    document.getElementById('newTimerTitle').value = ""; document.getElementById('newTimerCategory').value = "";
                    document.getElementById('newTimerInitialDate').value = ds; document.getElementById('initialDateGroup').style.display = "block";
                    document.getElementById('timerSubmitBtn').setAttribute('onclick', 'createTimer()');
                }
            }
            if (type === 'log') {
                if (logId) {
                    const t = data.find(t => t.id === id.toString()); const l = t.logs.find(l => l.id === logId);
                    const ld = new Date(l.timestamp); ld.setMinutes(ld.getMinutes() - ld.getTimezoneOffset());
                    document.getElementById('logModalTitle').innerText = "履歴を編集";
                    document.getElementById('newLogDate').value = ld.toISOString().slice(0, 16);
                    document.getElementById('newLogMemo').value = l.memo || "";
                    document.getElementById('logSubmitBtn').setAttribute('onclick', 'updateLog()');
                } else {
                    document.getElementById('logModalTitle').innerText = "履歴追加";
                    document.getElementById('newLogDate').value = ds; document.getElementById('newLogMemo').value = "";
                    document.getElementById('logSubmitBtn').setAttribute('onclick', 'addLog()');
                }
            }
        };

        window.closeModal = (type) => { document.getElementById(`${type}Modal`).style.display = 'none'; };

        window.deleteTimer = (id) => {
            const timer = data.find(t => t.id === id.toString());
            document.getElementById('deleteTargetName').innerText = timer ? `「${timer.title}」を削除` : "タイマーの削除";
            document.getElementById('deleteModal').style.display = 'flex';
            document.getElementById('deleteExecuteBtn').onclick = async () => {
                await deleteDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'timers', id.toString()));
                closeModal('delete');
            };
        };

        window.deleteLog = (timerId, logId) => {
            const timer = data.find(t => t.id === timerId.toString());
            const log = timer?.logs.find(l => l.id === logId);
            document.getElementById('deleteTargetName').innerText = log ? `履歴(${new Date(log.timestamp).toLocaleDateString()})を削除` : "履歴の削除";
            document.getElementById('deleteModal').style.display = 'flex';
            document.getElementById('deleteExecuteBtn').onclick = async () => {
                const updatedLogs = timer.logs.filter(l => l.id !== logId);
                await updateDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'timers', timerId.toString()), { logs: updatedLogs });
                closeModal('delete');
            };
        };

        window.createTimer = async () => {
            const title = document.getElementById('newTimerTitle').value.trim(), cat = document.getElementById('newTimerCategory').value.trim() || '未分類', date = document.getElementById('newTimerInitialDate').value;
            if (!title) return;
            const nid = Date.now().toString(), nt = { id: nid, title, category: cat, isExpanded: false, logs: date ? [{ id: Date.now()+1, timestamp: new Date(date).getTime(), memo: document.getElementById('newTimerInitialMemo').value.trim() }] : [] };
            await setDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'timers', nid), nt);
            closeModal('timer');
        };

        window.updateTimer = async () => {
            const title = document.getElementById('newTimerTitle').value.trim(), cat = document.getElementById('newTimerCategory').value.trim() || '未分類';
            await updateDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'timers', currentEditingTimerId.toString()), { title, category: cat });
            closeModal('timer');
        };

        window.addLog = async () => {
            const ds = document.getElementById('newLogDate').value, memo = document.getElementById('newLogMemo').value.trim();
            if (!ds) return;
            const t = data.find(t => t.id === currentEditingTimerId.toString());
            if (t) {
                const logs = [...t.logs, { id: Date.now(), timestamp: new Date(ds).getTime(), memo }].sort((a,b) => b.timestamp - a.timestamp);
                await updateDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'timers', t.id), { logs: logs, isExpanded: true });
                closeModal('log');
            }
        };

        window.updateLog = async () => {
            const ds = document.getElementById('newLogDate').value, memo = document.getElementById('newLogMemo').value.trim();
            const t = data.find(t => t.id === currentEditingTimerId.toString());
            const logs = t.logs.map(l => l.id === currentEditingLogId ? { ...l, timestamp: new Date(ds).getTime(), memo } : l).sort((a,b) => b.timestamp - a.timestamp);
            await updateDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'timers', t.id), { logs: logs, isExpanded: true });
            closeModal('log');
        };

        window.toggleExpand = async (id) => { const t = data.find(t => t.id === id.toString()); await updateDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'timers', id.toString()), { isExpanded: !t.isExpanded }); };
        window.filterCategory = (cat) => { selectedCategory = cat; renderCategories(); render(); };
        window.updateSort = (mode) => { sortMode = mode; render(); };

        window.exportCSV = () => {
            const header = ["Category", "Title", "LogDate", "LogMemo"];
            const rows = [];
            data.forEach(t => t.logs.forEach(l => {
                const localDate = new Date(l.timestamp).toLocaleString('ja-JP').replace(/\//g, '-');
                rows.push([t.category, t.title, localDate, l.memo]);
            }));
            const csv = "\uFEFF" + [header.join(","), ...rows.map(r => r.map(v => `"${(v||"").toString().replace(/"/g,'""')}"`).join(","))].join("\n");
            const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' })); a.download = `timer_export.csv`; a.click();
        };

        window.exportJSON = () => {
            const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' })); a.download = `timer_backup.json`; a.click();
        };

        function updateCategoryList() {
            const cats = [...new Set(data.map(t => t.category))].filter(c => c !== '未分類');
            document.getElementById('existingCategories').innerHTML = cats.map(c => `<option value="${c}">`).join('');
        }
        function renderCategories() {
            const cats = ['すべて', ...new Set(data.map(t => t.category))].sort();
            document.getElementById('categoryTabs').innerHTML = cats.map(cat => `<button onclick="filterCategory('${cat}')" class="${selectedCategory === cat ? 'bg-slate-800 text-white' : 'bg-white text-slate-500 border border-slate-200'} px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition">
                    ${cat}
                </button>`).join('');
        }
        
        function render() {
            const container = document.getElementById('mainContainer'); container.innerHTML = '';
            let filtered = selectedCategory === 'すべて' ? [...data] : data.filter(t => t.category === selectedCategory);

            filtered.sort((a, b) => {
                const tsA = a.logs[0]?.timestamp || 0, tsB = b.logs[0]?.timestamp || 0;
                const now = Date.now();
                switch(sortMode) {
                    case 'recent': 
                        const isFutureA = tsA > now, isFutureB = tsB > now;
                        if (isFutureA && !isFutureB) return -1;
                        if (!isFutureA && isFutureB) return 1;
                        if (isFutureA && isFutureB) return tsA - tsB; 
                        return tsB - tsA; 
                    case 'modified': return Math.max(...b.logs.map(l => l.id), 0) - Math.max(...a.logs.map(l => l.id), 0);
                    case 'created': return Number(b.id) - Number(a.id);
                    case 'name': return a.title.localeCompare(b.title, 'ja');
                    default: return 0;
                }
            });

            filtered.forEach(timer => {
                const latest = timer.logs[0];
                const relTime = latest ? formatRelativeTime(latest.timestamp) : null;
                const card = document.createElement('div'); card.className = "bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-4";
                
                let timeline = '';
                if (timer.isExpanded && timer.logs.length > 0) {
                    timeline = `<div class="px-6 pb-6 pt-2 space-y-6 relative"><div class="timeline-line"></div>${timer.logs.map((log, idx) => {
                        const rel = formatRelativeTime(log.timestamp);
                        const interval = idx < timer.logs.length - 1 ? calculateInterval(log.timestamp, timer.logs[idx+1].timestamp) : null;
                        const badgeClass = rel.isFuture ? 'bg-orange-500 text-white' : 'bg-indigo-700 text-white';
                        return `<div class="relative pl-8 group"><div class="timeline-dot"></div><div class="flex justify-between items-start"><div class="flex-1" onclick="event.stopPropagation(); openModal('log', '${timer.id}', ${log.id})"><div class="flex items-center gap-2 mb-1"><span class="text-[10px] font-black px-2 py-0.5 rounded shadow-sm ${badgeClass}">${rel.text}</span><span class="text-[10px] text-slate-400 font-medium">${new Date(log.timestamp).toLocaleDateString()}</span></div>${interval ? `<div class="text-[10px] text-sky-600 font-black tracking-tight mb-1 bg-sky-50 px-1.5 py-0.5 rounded inline-block border border-sky-100">${interval}</div>` : ''}${log.memo ? `<p class="text-[11px] text-slate-500 mt-1 bg-slate-50 p-2 rounded-lg border border-slate-100">${log.memo.replace(/\n/g, '<br>')}</p>` : ''}</div><button onclick="event.stopPropagation(); deleteLog('${timer.id}', ${log.id})" class="p-1 text-slate-300 hover:text-red-400 transition ml-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button></div></div>`;
                    }).join('')}</div>`;
                }
                const latestBadgeClass = relTime ? (relTime.isFuture ? 'bg-orange-500 text-white' : 'bg-indigo-700 text-white') : '';
                card.innerHTML = `<div class="p-5 flex justify-between items-start cursor-pointer hover:bg-slate-50 transition" onclick="toggleExpand('${timer.id}')"><div class="flex-1"><div class="flex items-center gap-2 mb-2"><span class="text-[9px] font-black uppercase px-2 py-0.5 bg-slate-100 text-slate-500 rounded">${timer.category}</span>${relTime ? `<span class="text-[10px] font-black px-2 py-0.5 rounded shadow-sm ${latestBadgeClass} mono">${relTime.text}</span>` : ''}</div><div class="flex items-center gap-2"><h2 class="text-lg font-bold text-slate-800 tracking-tight">${timer.title}</h2><button onclick="event.stopPropagation(); openModal('timer', '${timer.id}')" class="text-slate-300 hover:text-sky-500 transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></button></div></div><div class="flex flex-col items-end gap-3" onclick="event.stopPropagation()"><button onclick="deleteTimer('${timer.id}')" class="text-slate-400 hover:text-red-400 transition p-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button><button onclick="openModal('log', '${timer.id}')" class="w-10 h-10 bg-sky-50 text-sky-600 rounded-full flex items-center justify-center hover:bg-sky-500 hover:text-white transition shadow-sm"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M12 4v16m8-8H4"/></svg></button></div></div>${timeline}`;
                container.appendChild(card);
            });
        }
        setInterval(() => render(), 60000);
    </script>
</body>
</html>
