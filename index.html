<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline Context Manager Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .timeline-line { position: absolute; left: 7px; top: 0; bottom: 0; width: 2px; background-color: #e2e8f0; }
        .timeline-dot { position: absolute; left: 0; top: 6px; width: 16px; height: 16px; background-color: #0ea5e9; border: 3px solid #fff; border-radius: 50%; z-index: 10; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-900 pb-12">
    <!-- App Container (Initially Hidden if no config) -->
    <div id="appRoot" class="hidden">
        <div class="max-w-xl mx-auto px-4 py-6">
            <header class="mb-6">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h1 class="text-2xl font-black tracking-tighter text-slate-800">Timeline Since</h1>
                        <p class="text-xs text-slate-500 font-medium italic" id="syncStatus">Cloud Syncing...</p>
                    </div>
                    <div class="flex flex-col items-end gap-1">
                        <div class="flex gap-2 text-xs font-mono text-slate-400" id="userIdentifier"></div>
                        <button onclick="clearFirebaseConfig()" class="text-[10px] text-red-400 hover:text-red-600 underline">設定解除</button>
                    </div>
                </div>

                <div class="flex gap-2 items-center mb-6">
                    <button onclick="openModal('timer')" class="flex-1 bg-sky-500 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-sky-100 hover:bg-sky-600 active:scale-[0.98] transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
                        新規作成
                    </button>
                    <button onclick="exportCSV()" class="p-3 bg-slate-800 text-white rounded-xl shadow-lg shadow-slate-200 hover:bg-slate-700 active:scale-95 transition-all" title="CSV出力">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    </button>
                </div>

                <div id="categoryTabs" class="flex gap-2 overflow-x-auto pb-4 no-scrollbar"></div>
            </header>

            <div id="mainContainer" class="space-y-6"></div>
        </div>
    </div>

    <!-- Setup Wizard (Shown if no config) -->
    <div id="setupWizard" class="hidden min-h-screen flex items-center justify-center p-4 bg-slate-50">
        <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-2xl border border-slate-100">
            <h2 class="text-2xl font-black text-slate-800 mb-2 leading-tight">Firebase Cloud Setup</h2>
            <div class="mt-4 p-4 bg-blue-50 rounded-xl border border-blue-100 mb-6">
                <h3 class="text-xs font-bold text-blue-700 uppercase mb-2">設定値（Config）の取得手順</h3>
                <ol class="text-[11px] text-blue-600 space-y-2 list-decimal ml-4 leading-relaxed">
                    <li><a href="https://console.firebase.google.com/" target="_blank" class="underline font-bold">Firebase Console</a>で「プロジェクトを追加」</li>
                    <li>プロジェクト概要画面にある「<b>&lt;/&gt;</b> (Web)」アイコンをクリック</li>
                    <li>アプリ名を入力して「アプリを登録」をクリック</li>
                    <li>画面に表示される <code class="bg-blue-100 px-1">const firebaseConfig = { ... };</code> の<b>中身（{ }の部分のみ）</b>をコピー</li>
                    <li>下の枠に貼り付けて「保存」を押す</li>
                </ol>
            </div>
            
            <div class="space-y-4">
                <label class="text-[10px] font-bold text-slate-400 uppercase">Config JSON / Code</label>
                <textarea id="configInput" placeholder='{"apiKey": "...", "projectId": "...", ...}' class="w-full h-32 p-4 bg-slate-50 border border-slate-200 rounded-xl font-mono text-[10px] focus:ring-2 focus:ring-sky-500 outline-none resize-none"></textarea>
                <button onclick="saveFirebaseConfig()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-slate-700 transition-all active:scale-95">
                    設定を保存して開始
                </button>
            </div>
        </div>
    </div>

    <!-- Modals (Timer & Log) -->
    <div id="timerModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-[100] backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl">
            <h3 class="text-lg font-bold mb-4" id="timerModalTitle">新規タイマー</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">カテゴリ名</label>
                    <input type="text" id="newTimerCategory" list="existingCategories" placeholder="未分類" class="w-full border-b-2 border-slate-100 py-2 focus:border-sky-500 outline-none transition bg-transparent text-sm">
                    <datalist id="existingCategories"></datalist>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">タイマー名</label>
                    <input type="text" id="newTimerTitle" class="w-full border-b-2 border-slate-100 py-2 focus:border-sky-500 outline-none transition text-sm">
                </div>
                <div id="initialDateGroup">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">1回目の日時設定</label>
                    <div class="flex gap-2 items-center">
                        <input type="datetime-local" id="newTimerInitialDate" class="flex-1 border-b-2 border-slate-100 py-2 focus:border-sky-500 outline-none transition text-sm">
                        <button type="button" class="px-3 py-1 bg-slate-100 text-slate-600 rounded-lg text-xs font-bold hover:bg-slate-200 transition" onclick="document.activeElement.blur()">決定</button>
                    </div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mt-2 block">1回目の内容（メモ）</label>
                    <textarea id="newTimerInitialMemo" placeholder="空欄可" class="w-full border rounded-lg p-2 mt-1 text-sm h-16 resize-none outline-none border-slate-200"></textarea>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">基本メモ（全体方針）</label>
                    <textarea id="newTimerMemo" class="w-full border rounded-lg p-2 mt-1 text-sm h-20 resize-none outline-none border-slate-200"></textarea>
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="closeModal('timer')" class="flex-1 py-3 text-slate-500 font-bold">キャンセル</button>
                    <button id="timerSubmitBtn" onclick="createTimer()" class="flex-1 py-3 bg-slate-800 text-white rounded-xl font-bold">保存</button>
                </div>
            </div>
        </div>
    </div>

    <div id="logModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-[100] backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl">
            <h3 class="text-lg font-bold mb-4" id="logModalTitle">履歴追加</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">日付</label>
                    <div class="flex gap-2 items-center">
                        <input type="datetime-local" id="newLogDate" class="flex-1 border-b-2 border-slate-100 py-2 focus:border-sky-500 outline-none transition text-sm">
                        <button type="button" class="px-3 py-1 bg-slate-100 text-slate-600 rounded-lg text-xs font-bold hover:bg-slate-200 transition" onclick="document.activeElement.blur()">決定</button>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">今回のメモ</label>
                    <textarea id="newLogMemo" class="w-full border rounded-lg p-2 mt-1 text-sm h-24 resize-none outline-none border-slate-200"></textarea>
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="closeModal('log')" class="flex-1 py-3 text-slate-500 font-bold">キャンセル</button>
                    <button id="logSubmitBtn" onclick="addLog()" class="flex-1 py-3 bg-sky-500 text-white rounded-xl font-bold">追加</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot, query } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        function getFirebaseConfig() {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                return JSON.parse(__firebase_config);
            }
            const stored = localStorage.getItem('since_timer_cloud_config');
            if (stored) return JSON.parse(stored);
            return null;
        }

        const firebaseConfig = getFirebaseConfig();

        if (!firebaseConfig || !firebaseConfig.projectId) {
            document.getElementById('setupWizard').classList.remove('hidden');
        } else {
            startApp(firebaseConfig);
        }

        window.saveFirebaseConfig = () => {
            const input = document.getElementById('configInput').value.trim();
            try {
                // 正規表現で { } の中身を抽出（前後がコピーされていても対応）
                const match = input.match(/\{[\s\S]*\}/);
                if (!match) throw new Error("Object not found");
                
                let target = match[0];
                // JSオブジェクト形式をJSON形式に変換するクレンジング
                let jsonStr = target
                    .replace(/([{,])\s*([a-zA-Z0-9]+)\s*:/g, '$1"$2":') // キーを"で囲む
                    .replace(/:\s*'([^']*)'/g, ':"$1"')               // ' を " に置換
                    .replace(/,\s*([}\]])/g, '$1');                   // 末尾のカンマを除去

                const parsed = JSON.parse(jsonStr);
                
                if (!parsed.apiKey || !parsed.projectId) {
                    throw new Error("Invalid config fields");
                }
                
                localStorage.setItem('since_timer_cloud_config', JSON.stringify(parsed));
                location.reload();
            } catch (err) {
                console.error("Config parse error:", err);
                alert("設定の解析に失敗しました。Firebaseの設定コード（{ } を含む塊）をそのまま貼り付けてください。");
            }
        };

        window.clearFirebaseConfig = () => {
            if (confirm("Firebaseの設定を解除しますか？")) {
                localStorage.removeItem('since_timer_cloud_config');
                location.reload();
            }
        };

        function startApp(config) {
            document.getElementById('appRoot').classList.remove('hidden');
            const app = initializeApp(config);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'since-timer-cloud';

            let data = [];
            let user = null;
            let selectedCategory = 'すべて';
            let currentEditingTimerId = null;
            let currentEditingLogId = null;

            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (err) {
                    console.error("Auth failed", err);
                    document.getElementById('syncStatus').innerText = "Auth Error";
                }
            };

            onAuthStateChanged(auth, (u) => {
                user = u;
                if (user) {
                    document.getElementById('userIdentifier').innerText = `ID: ${user.uid.substring(0,8)}...`;
                    document.getElementById('syncStatus').innerText = "Cloud Synced";
                    setupRealtimeSync();
                }
            });

            function setupRealtimeSync() {
                if (!user) return;
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'timers'));
                onSnapshot(q, (snapshot) => {
                    data = snapshot.docs.map(doc => ({ docId: doc.id, ...doc.data() }));
                    renderCategories();
                    render();
                }, (error) => {
                    console.error("Sync error", error);
                    document.getElementById('syncStatus').innerText = "Offline";
                });
            }

            window.openModal = (type, id = null, logId = null) => {
                document.getElementById(`${type}Modal`).style.display = 'flex';
                currentEditingTimerId = id;
                currentEditingLogId = logId;
                const now = new Date();
                now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                const dateStr = now.toISOString().slice(0, 16);

                if (type === 'timer') {
                    updateCategoryDatalist();
                    if (id) {
                        const timer = data.find(t => t.id === id.toString());
                        document.getElementById('timerModalTitle').innerText = "タイマーを編集";
                        document.getElementById('newTimerTitle').value = timer.title;
                        document.getElementById('newTimerCategory').value = timer.category;
                        document.getElementById('newTimerMemo').value = timer.memo || "";
                        document.getElementById('initialDateGroup').style.display = "none";
                        document.getElementById('timerSubmitBtn').setAttribute('onclick', 'updateTimer()');
                    } else {
                        document.getElementById('timerModalTitle').innerText = "新規タイマー";
                        document.getElementById('newTimerTitle').value = "";
                        document.getElementById('newTimerCategory').value = "";
                        document.getElementById('newTimerMemo').value = "";
                        document.getElementById('newTimerInitialMemo').value = "";
                        document.getElementById('newTimerInitialDate').value = dateStr;
                        document.getElementById('initialDateGroup').style.display = "block";
                        document.getElementById('timerSubmitBtn').setAttribute('onclick', 'createTimer()');
                    }
                }
                if (type === 'log') {
                    if (logId) {
                        const timer = data.find(t => t.id === id.toString());
                        const log = timer.logs.find(l => l.id === logId);
                        const logDate = new Date(log.timestamp);
                        logDate.setMinutes(logDate.getMinutes() - logDate.getTimezoneOffset());
                        document.getElementById('logModalTitle').innerText = "履歴を編集";
                        document.getElementById('newLogDate').value = logDate.toISOString().slice(0, 16);
                        document.getElementById('newLogMemo').value = log.memo || "";
                        document.getElementById('logSubmitBtn').setAttribute('onclick', 'updateLog()');
                    } else {
                        document.getElementById('logModalTitle').innerText = "履歴追加";
                        document.getElementById('newLogDate').value = dateStr;
                        document.getElementById('newLogMemo').value = "";
                        document.getElementById('logSubmitBtn').setAttribute('onclick', 'addLog()');
                    }
                }
            };

            window.closeModal = (type) => {
                document.getElementById(`${type}Modal`).style.display = 'none';
            };

            window.createTimer = async () => {
                if (!user) return;
                const title = document.getElementById('newTimerTitle').value.trim();
                const category = document.getElementById('newTimerCategory').value.trim() || '未分類';
                const memo = document.getElementById('newTimerMemo').value.trim();
                const initialDate = document.getElementById('newTimerInitialDate').value;
                const initialMemo = document.getElementById('newTimerInitialMemo').value.trim();
                if (!title) return;

                const newId = Date.now().toString();
                const timerData = {
                    id: newId,
                    title,
                    category,
                    memo,
                    isExpanded: true,
                    logs: initialDate ? [{
                        id: Date.now() + 1,
                        timestamp: new Date(initialDate).getTime(),
                        memo: initialMemo
                    }] : []
                };

                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'timers', newId), timerData);
                closeModal('timer');
            };

            window.updateTimer = async () => {
                if (!user || !currentEditingTimerId) return;
                const title = document.getElementById('newTimerTitle').value.trim();
                const category = document.getElementById('newTimerCategory').value.trim() || '未分類';
                const memo = document.getElementById('newTimerMemo').value.trim();
                
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'timers', currentEditingTimerId.toString()), {
                    title, category, memo
                });
                closeModal('timer');
            };

            window.addLog = async () => {
                if (!user || !currentEditingTimerId) return;
                const dateStr = document.getElementById('newLogDate').value;
                const memo = document.getElementById('newLogMemo').value.trim();
                if (!dateStr) return;

                const timer = data.find(t => t.id === currentEditingTimerId.toString());
                if (timer) {
                    const updatedLogs = [...timer.logs, {
                        id: Date.now(),
                        timestamp: new Date(dateStr).getTime(),
                        memo: memo
                    }].sort((a, b) => b.timestamp - a.timestamp);

                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'timers', timer.id), {
                        logs: updatedLogs, isExpanded: true
                    });
                    closeModal('log');
                }
            };

            window.updateLog = async () => {
                if (!user || !currentEditingTimerId || !currentEditingLogId) return;
                const dateStr = document.getElementById('newLogDate').value;
                const memo = document.getElementById('newLogMemo').value.trim();

                const timer = data.find(t => t.id === currentEditingTimerId.toString());
                const updatedLogs = timer.logs.map(l => {
                    if (l.id === currentEditingLogId) {
                        return { ...l, timestamp: new Date(dateStr).getTime(), memo };
                    }
                    return l;
                }).sort((a, b) => b.timestamp - a.timestamp);

                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'timers', timer.id), {
                    logs: updatedLogs, isExpanded: true
                });
                closeModal('log');
            };

            window.deleteTimer = async (id) => {
                if (!user || !confirm('このタイマーとすべての履歴を完全に削除しますか？')) return;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'timers', id.toString()));
            };

            window.toggleExpand = async (id) => {
                if (!user) return;
                const timer = data.find(t => t.id === id.toString());
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'timers', id.toString()), {
                    isExpanded: !timer.isExpanded
                });
            };

            window.filterCategory = (cat) => {
                selectedCategory = cat;
                renderCategories();
                render();
            };

            window.exportCSV = () => {
                const header = ["Category", "Title", "LogDate", "LogMemo", "BaseMemo"];
                const rows = [];
                data.forEach(t => {
                    if (t.logs.length === 0) rows.push([t.category, t.title, "-", "-", t.memo]);
                    else t.logs.forEach(l => rows.push([t.category, t.title, new Date(l.timestamp).toISOString(), l.memo, t.memo]));
                });
                const csv = "\uFEFF" + [header.join(","), ...rows.map(r => r.map(v => `"${(v||"").toString().replace(/"/g,'""')}"`).join(","))].join("\n");
                const a = document.createElement("a");
                a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
                a.download = `timer_cloud_export_${Date.now()}.csv`;
                a.click();
            };

            function updateCategoryDatalist() {
                const categories = [...new Set(data.map(t => t.category))].filter(c => c !== '未分類');
                document.getElementById('existingCategories').innerHTML = categories.map(c => `<option value="${c}">`).join('');
            }

            function renderCategories() {
                const categories = ['すべて', ...new Set(data.map(t => t.category))].sort();
                document.getElementById('categoryTabs').innerHTML = categories.map(cat => `
                    <button onclick="filterCategory('${cat}')" class="${selectedCategory === cat ? 'bg-slate-800 text-white' : 'bg-white text-slate-500 border border-slate-200'} px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition shadow-sm">
                        ${cat}
                    </button>
                `).join('');
            }

            function formatTime(ms) {
                const diff = Date.now() - ms;
                const absDiff = Math.abs(diff);
                const totalDays = Math.floor(absDiff / 86400000);
                const years = Math.floor(totalDays / 365);
                const months = Math.floor((totalDays % 365) / 30.44);
                const days = Math.floor(totalDays % 30.44);
                let res = [];
                if (years > 0) res.push(`${years}y`);
                if (months > 0) res.push(`${months}m`);
                if (days > 0 || res.length === 0) res.push(`${days}d`);
                return { text: res.join(' ') + (diff >= 0 ? ' ago' : ' later'), isFuture: diff < 0 };
            }

            function render() {
                const container = document.getElementById('mainContainer');
                container.innerHTML = '';
                const filtered = selectedCategory === 'すべて' ? data : data.filter(t => t.category === selectedCategory);

                filtered.forEach(timer => {
                    const latest = timer.logs[0];
                    const relTime = latest ? formatTime(latest.timestamp) : null;
                    const card = document.createElement('div');
                    card.className = "bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-4";
                    
                    let timeline = '';
                    if (timer.isExpanded && timer.logs.length > 0) {
                        timeline = `
                            <div class="px-6 pb-6 pt-2 space-y-6 relative">
                                <div class="timeline-line"></div>
                                ${timer.logs.map(log => {
                                    const logTime = formatTime(log.timestamp);
                                    return `
                                        <div class="relative pl-8 group">
                                            <div class="timeline-dot"></div>
                                            <div class="flex justify-between items-start">
                                                <div class="flex-1" onclick="openModal('log', '${timer.id}', ${log.id})">
                                                    <div class="flex items-center gap-2">
                                                        <span class="text-sm font-black text-slate-700">${logTime.text}</span>
                                                        <span class="text-[10px] text-slate-400 font-medium">${new Date(log.timestamp).toLocaleDateString()}</span>
                                                        <svg class="w-3 h-3 text-slate-300 opacity-0 group-hover:opacity-100 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                                                    </div>
                                                    ${log.memo ? `<p class="text-[11px] text-slate-500 mt-1 bg-slate-50 p-2 rounded-lg border border-slate-100 leading-relaxed">${log.memo.replace(/\n/g, '<br>')}</p>` : ''}
                                                </div>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        `;
                    }

                    card.innerHTML = `
                        <div class="p-5 flex justify-between items-start cursor-pointer hover:bg-slate-50 transition" onclick="toggleExpand('${timer.id}')">
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-[9px] font-black uppercase px-2 py-0.5 bg-slate-100 text-slate-500 rounded">${timer.category}</span>
                                    ${relTime ? `<span class="text-xs font-bold ${relTime.isFuture ? 'text-emerald-500' : 'text-sky-500'} mono">${relTime.text}</span>` : ''}
                                    <span class="text-[10px] text-slate-300 ml-2 font-bold">履歴 - ${timer.logs.length}</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <h2 class="text-lg font-bold text-slate-800 tracking-tight">${timer.title}</h2>
                                    <button onclick="event.stopPropagation(); openModal('timer', '${timer.id}')" class="text-slate-300 hover:text-sky-500 transition">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                                    </button>
                                </div>
                                ${timer.memo ? `<p class="text-[10px] text-slate-400 mt-1 line-clamp-1">${timer.memo}</p>` : ''}
                            </div>
                            <div class="flex flex-col items-end gap-3" onclick="event.stopPropagation()">
                                <button onclick="deleteTimer(${timer.id})" class="text-slate-200 hover:text-red-400 transition">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                </button>
                                <button onclick="openModal('log', ${timer.id})" class="w-10 h-10 bg-sky-50 text-sky-600 rounded-full flex items-center justify-center hover:bg-sky-500 hover:text-white transition shadow-sm">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
                                </button>
                            </div>
                        </div>
                        ${timeline}
                    `;
                    container.appendChild(card);
                });
            }

            initAuth();
            setInterval(() => render(), 60000);
        }
    </script>
</body>
</html>
