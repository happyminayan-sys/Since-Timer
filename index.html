<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline Context Manager Cloud Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .timeline-line { position: absolute; left: 7px; top: 0; bottom: 0; width: 2px; background-color: #e2e8f0; }
        .timeline-dot { position: absolute; left: 0; top: 6px; width: 16px; height: 16px; background-color: #0ea5e9; border: 3px solid #fff; border-radius: 50%; z-index: 10; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-900 pb-12">
    <!-- App Container -->
    <div id="appRoot" class="hidden">
        <div class="max-w-xl mx-auto px-4 py-6">
            <header class="mb-6">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h1 class="text-2xl font-black tracking-tighter text-slate-800">Timeline Since</h1>
                        <p class="text-xs text-slate-500 font-medium italic" id="syncStatus">Cloud Syncing...</p>
                    </div>
                    <div class="flex flex-col items-end gap-1">
                        <div class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">My UID (For Rules)</div>
                        <div class="text-[10px] font-mono text-sky-600 bg-sky-50 px-2 py-1 rounded border border-sky-100 select-all" id="userIdentifier">---</div>
                    </div>
                </div>

                <!-- Action Buttons: Enhanced with Export/Backup/Restore -->
                <div class="flex gap-2 items-center mb-6">
                    <button onclick="openModal('timer')" class="flex-1 bg-sky-500 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-sky-100 hover:bg-sky-600 active:scale-[0.98] transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
                        新規作成
                    </button>
                    <button onclick="exportCSV()" class="p-3 bg-slate-800 text-white rounded-xl shadow-lg shadow-slate-200 hover:bg-slate-700 active:scale-95 transition-all" title="Notion用CSV出力">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    </button>
                    <button onclick="exportJSON()" class="p-3 bg-white border border-slate-200 text-slate-500 rounded-xl shadow-sm hover:bg-slate-50 active:scale-95 transition-all" title="JSONバックアップ">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                    </button>
                    <label class="p-3 bg-white border border-slate-200 text-slate-500 rounded-xl shadow-sm hover:bg-slate-50 active:scale-95 transition-all cursor-pointer" title="JSON復元">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l4 4m-4-4h12"/></svg>
                        <input type="file" class="hidden" accept=".json" onchange="importJSON(event)">
                    </label>
                </div>

                <div id="categoryTabs" class="flex gap-2 overflow-x-auto pb-4 no-scrollbar"></div>
            </header>

            <div id="mainContainer" class="space-y-6"></div>
        </div>
    </div>

    <!-- Setup Wizard (Same as before) -->
    <div id="setupWizard" class="hidden min-h-screen flex items-center justify-center p-4 bg-slate-50">
        <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-2xl border border-slate-100">
            <h2 class="text-2xl font-black text-slate-800 mb-2 leading-tight">Firebase Cloud Setup</h2>
            <div class="mt-4 p-4 bg-blue-50 rounded-xl border border-blue-100 mb-6 text-[11px] text-blue-600 leading-relaxed">
                手順：1.Firebase ConsoleでWebアプリを追加 2.表示された <code class="bg-blue-100 px-1">const firebaseConfig = { ... };</code> の中身をコピー 3.下の枠に貼り付け。
            </div>
            <div class="space-y-4">
                <textarea id="configInput" placeholder='{"apiKey": "...", "projectId": "...", ...}' class="w-full h-32 p-4 bg-slate-50 border border-slate-200 rounded-xl font-mono text-[10px] focus:ring-2 focus:ring-sky-500 outline-none resize-none"></textarea>
                <button onclick="saveFirebaseConfig()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-slate-700 transition-all active:scale-95">設定を保存して開始</button>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="timerModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-[100] backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl">
            <h3 class="text-lg font-bold mb-4">新規タイマー</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">カテゴリ名</label>
                    <input type="text" id="newTimerCategory" list="existingCategories" placeholder="未分類" class="w-full border-b-2 border-slate-100 py-2 focus:border-sky-500 outline-none transition bg-transparent text-sm">
                    <datalist id="existingCategories"></datalist>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">タイマー名</label>
                    <input type="text" id="newTimerTitle" class="w-full border-b-2 border-slate-100 py-2 focus:border-sky-500 outline-none transition text-sm">
                </div>
                <div id="initialDateGroup">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">1回目の日時設定</label>
                    <div class="flex gap-2 items-center">
                        <input type="datetime-local" id="newTimerInitialDate" class="flex-1 border-b-2 border-slate-100 py-2 focus:border-sky-500 outline-none transition text-sm">
                        <button type="button" class="px-3 py-1 bg-slate-100 text-slate-600 rounded-lg text-xs font-bold" onclick="document.activeElement.blur()">決定</button>
                    </div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mt-2 block">1回目の内容（メモ）</label>
                    <textarea id="newTimerInitialMemo" placeholder="空欄可" class="w-full border rounded-lg p-2 mt-1 text-sm h-16 resize-none outline-none border-slate-200"></textarea>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">基本メモ（全体方針）</label>
                    <textarea id="newTimerMemo" class="w-full border rounded-lg p-2 mt-1 text-sm h-20 resize-none outline-none border-slate-200"></textarea>
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="closeModal('timer')" class="flex-1 py-3 text-slate-500 font-bold">キャンセル</button>
                    <button id="timerSubmitBtn" onclick="createTimer()" class="flex-1 py-3 bg-slate-800 text-white rounded-xl font-bold">保存</button>
                </div>
            </div>
        </div>
    </div>

    <div id="logModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-[100] backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl">
            <h3 class="text-lg font-bold mb-4">履歴追加</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">日付</label>
                    <div class="flex gap-2 items-center">
                        <input type="datetime-local" id="newLogDate" class="w-full border-b-2 border-slate-100 py-2 focus:border-sky-500 outline-none transition text-sm">
                        <button type="button" class="px-3 py-1 bg-slate-100 text-slate-600 rounded-lg text-xs font-bold" onclick="document.activeElement.blur()">決定</button>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">今回のメモ</label>
                    <textarea id="newLogMemo" class="w-full border rounded-lg p-2 mt-1 text-sm h-24 resize-none outline-none border-slate-200"></textarea>
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="closeModal('log')" class="flex-1 py-3 text-slate-500 font-bold">キャンセル</button>
                    <button id="logSubmitBtn" onclick="addLog()" class="flex-1 py-3 bg-sky-500 text-white rounded-xl font-bold">追加</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot, query } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // ==========================================
        // Config Hardcoding Area (For portable use)
        // ==========================================
        const hardcodedConfig = {
  apiKey: "AIzaSyC6TKgRNRFhm023uAtTnXyJXHcQtO4i4nA",
  authDomain: "timer-d7f73.firebaseapp.com",
  projectId: "timer-d7f73",
  storageBucket: "timer-d7f73.firebasestorage.app",
  messagingSenderId: "779981072804",
  appId: "1:779981072804:web:62bcfad1b1bbe392993931",
  measurementId: "G-3W7X6BDZRG"
};

        function getFirebaseConfig() {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) return JSON.parse(__firebase_config);
            if (hardcodedConfig && hardcodedConfig.apiKey) return hardcodedConfig;
            const stored = localStorage.getItem('since_timer_cloud_config');
            if (stored) return JSON.parse(stored);
            return null;
        }

        const firebaseConfig = getFirebaseConfig();
        if (!firebaseConfig || !firebaseConfig.projectId) {
            document.getElementById('setupWizard').classList.remove('hidden');
        } else {
            startApp(firebaseConfig);
        }

        window.saveFirebaseConfig = () => {
            const input = document.getElementById('configInput').value.trim();
            try {
                const match = input.match(/\{[\s\S]*\}/);
                if (!match) throw new Error();
                let jsonStr = match[0].replace(/([{,])\s*([a-zA-Z0-9]+)\s*:/g, '$1"$2":').replace(/:\s*'([^']*)'/g, ':"$1"').replace(/,\s*([}\]])/g, '$1');
                localStorage.setItem('since_timer_cloud_config', jsonStr);
                location.reload();
            } catch (err) { alert("設定を解析できませんでした。"); }
        };

        function startApp(config) {
            document.getElementById('appRoot').classList.remove('hidden');
            const app = initializeApp(config);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'since-timer-cloud';

            let data = [];
            let user = null;
            let selectedCategory = 'すべて';
            let currentEditingTimerId = null;
            let currentEditingLogId = null;

            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                    else await signInAnonymously(auth);
                } catch (err) {
                    let msg = err.code === 'auth/operation-not-allowed' ? "匿名ログインをONにしてください" : "Auth Error";
                    document.getElementById('syncStatus').innerText = msg;
                    document.getElementById('syncStatus').style.color = "#ef4444";
                }
            };

            onAuthStateChanged(auth, (u) => {
                user = u;
                if (user) {
                    document.getElementById('userIdentifier').innerText = user.uid;
                    document.getElementById('syncStatus').innerText = "Cloud Synced";
                    setupRealtimeSync();
                }
            });

            function setupRealtimeSync() {
                if (!user) return;
                const q = query(collection(db, 'artifacts', appId, 'users', user.uid, 'timers'));
                onSnapshot(q, (snapshot) => {
                    data = snapshot.docs.map(doc => ({ docId: doc.id, ...doc.data() }));
                    renderCategories();
                    render();
                }, (error) => {
                    document.getElementById('syncStatus').innerText = "Database Access Error";
                    document.getElementById('syncStatus').style.color = "#ef4444";
                });
            }

            window.openModal = (type, id = null, logId = null) => {
                document.getElementById(`${type}Modal`).style.display = 'flex';
                currentEditingTimerId = id; currentEditingLogId = logId;
                const now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                const dateStr = now.toISOString().slice(0, 16);
                if (type === 'timer') {
                    updateCategoryDatalist();
                    if (id) {
                        const t = data.find(t => t.id === id.toString());
                        document.getElementById('timerModalTitle').innerText = "タイマーを編集";
                        document.getElementById('newTimerTitle').value = t.title;
                        document.getElementById('newTimerCategory').value = t.category;
                        document.getElementById('newTimerMemo').value = t.memo || "";
                        document.getElementById('initialDateGroup').style.display = "none";
                        document.getElementById('timerSubmitBtn').setAttribute('onclick', 'updateTimer()');
                    } else {
                        document.getElementById('timerModalTitle').innerText = "新規タイマー";
                        document.getElementById('newTimerTitle').value = ""; document.getElementById('newTimerCategory').value = "";
                        document.getElementById('newTimerMemo').value = ""; document.getElementById('newTimerInitialMemo').value = "";
                        document.getElementById('newTimerInitialDate').value = dateStr; document.getElementById('initialDateGroup').style.display = "block";
                        document.getElementById('timerSubmitBtn').setAttribute('onclick', 'createTimer()');
                    }
                }
                if (type === 'log') {
                    if (logId) {
                        const t = data.find(t => t.id === id.toString()); const l = t.logs.find(l => l.id === logId);
                        const ld = new Date(l.timestamp); ld.setMinutes(ld.getMinutes() - ld.getTimezoneOffset());
                        document.getElementById('logModalTitle').innerText = "履歴を編集";
                        document.getElementById('newLogDate').value = ld.toISOString().slice(0, 16);
                        document.getElementById('newLogMemo').value = l.memo || "";
                        document.getElementById('logSubmitBtn').setAttribute('onclick', 'updateLog()');
                    } else {
                        document.getElementById('logModalTitle').innerText = "履歴追加";
                        document.getElementById('newLogDate').value = dateStr; document.getElementById('newLogMemo').value = "";
                        document.getElementById('logSubmitBtn').setAttribute('onclick', 'addLog()');
                    }
                }
            };

            window.closeModal = (type) => { document.getElementById(`${type}Modal`).style.display = 'none'; };

            window.createTimer = async () => {
                if (!user) return;
                const title = document.getElementById('newTimerTitle').value.trim();
                const category = document.getElementById('newTimerCategory').value.trim() || '未分類';
                const memo = document.getElementById('newTimerMemo').value.trim();
                const initialDate = document.getElementById('newTimerInitialDate').value;
                const initialMemo = document.getElementById('newTimerInitialMemo').value.trim();
                if (!title) return;
                const newId = Date.now().toString();
                const timerData = { id: newId, title, category, memo, isExpanded: true, logs: initialDate ? [{ id: Date.now() + 1, timestamp: new Date(initialDate).getTime(), memo: initialMemo }] : [] };
                await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'timers', newId), timerData);
                closeModal('timer');
            };

            window.updateTimer = async () => {
                if (!user || !currentEditingTimerId) return;
                const title = document.getElementById('newTimerTitle').value.trim();
                const category = document.getElementById('newTimerCategory').value.trim() || '未分類';
                const memo = document.getElementById('newTimerMemo').value.trim();
                await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'timers', currentEditingTimerId.toString()), { title, category, memo });
                closeModal('timer');
            };

            window.addLog = async () => {
                if (!user || !currentEditingTimerId) return;
                const dateStr = document.getElementById('newLogDate').value;
                const memo = document.getElementById('newLogMemo').value.trim();
                if (!dateStr) return;
                const timer = data.find(t => t.id === currentEditingTimerId.toString());
                if (timer) {
                    const updatedLogs = [...timer.logs, { id: Date.now(), timestamp: new Date(dateStr).getTime(), memo: memo }].sort((a, b) => b.timestamp - a.timestamp);
                    await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'timers', timer.id), { logs: updatedLogs, isExpanded: true });
                    closeModal('log');
                }
            };

            window.updateLog = async () => {
                if (!user || !currentEditingTimerId || !currentEditingLogId) return;
                const dateStr = document.getElementById('newLogDate').value;
                const memo = document.getElementById('newLogMemo').value.trim();
                const timer = data.find(t => t.id === currentEditingTimerId.toString());
                const updatedLogs = timer.logs.map(l => l.id === currentEditingLogId ? { ...l, timestamp: new Date(dateStr).getTime(), memo } : l).sort((a, b) => b.timestamp - a.timestamp);
                await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'timers', timer.id), { logs: updatedLogs, isExpanded: true });
                closeModal('log');
            };

            window.deleteTimer = async (id) => { if (!user || !confirm('完全に削除しますか？')) return; await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'timers', id.toString())); };
            window.toggleExpand = async (id) => { if (!user) return; const timer = data.find(t => t.id === id.toString()); await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'timers', id.toString()), { isExpanded: !timer.isExpanded }); };
            window.filterCategory = (cat) => { selectedCategory = cat; renderCategories(); render(); };

            window.exportCSV = () => {
                const header = ["Category", "Title", "LogDate", "LogMemo", "BaseMemo"];
                const rows = [];
                data.forEach(t => { if (t.logs.length === 0) rows.push([t.category, t.title, "-", "-", t.memo]); else t.logs.forEach(l => rows.push([t.category, t.title, new Date(l.timestamp).toISOString(), l.memo, t.memo])); });
                const csv = "\uFEFF" + [header.join(","), ...rows.map(r => r.map(v => `"${(v||"").toString().replace(/"/g,'""')}"`).join(","))].join("\n");
                const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' })); a.download = `timer_export_${Date.now()}.csv`; a.click();
            };

            // Logical Addition: JSON Export for physical backup
            window.exportJSON = () => {
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
                a.download = `since_timer_cloud_backup_${Date.now()}.json`; a.click();
            };

            // Logical Addition: JSON Import for disaster recovery
            window.importJSON = async (e) => {
                const file = e.target.files[0];
                if (!file || !confirm("現在クラウドにあるデータへ追加（上書き）されます。よろしいですか？")) return;
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        if (Array.isArray(imported)) {
                            for (const timer of imported) {
                                const newId = timer.id || Date.now().toString();
                                await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'timers', newId.toString()), timer);
                            }
                            alert('データの復元が完了しました。クラウドと同期されます。');
                        }
                    } catch (err) { alert('読み込みに失敗しました。'); }
                };
                reader.readAsText(file);
            };

            function updateCategoryDatalist() { const categories = [...new Set(data.map(t => t.category))].filter(c => c !== '未分類'); document.getElementById('existingCategories').innerHTML = categories.map(c => `<option value="${c}">`).join(''); }
            function renderCategories() { const categories = ['すべて', ...new Set(data.map(t => t.category))].sort(); document.getElementById('categoryTabs').innerHTML = categories.map(cat => `<button onclick="filterCategory('${cat}')" class="${selectedCategory === cat ? 'bg-slate-800 text-white' : 'bg-white text-slate-500 border border-slate-200'} px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition shadow-sm">${cat}</button>`).join(''); }
            function formatTime(ms) { const diff = Date.now() - ms; const absDiff = Math.abs(diff); const totalDays = Math.floor(absDiff / 86400000); const years = Math.floor(totalDays / 365); const months = Math.floor((totalDays % 365) / 30.44); const days = Math.floor(totalDays % 30.44); let res = []; if (years > 0) res.push(`${years}y`); if (months > 0) res.push(`${months}m`); if (days > 0 || res.length === 0) res.push(`${days}d`); return { text: res.join(' ') + (diff >= 0 ? ' ago' : ' later'), isFuture: diff < 0 }; }

            function render() {
                const container = document.getElementById('mainContainer');
                container.innerHTML = '';
                const filtered = selectedCategory === 'すべて' ? data : data.filter(t => t.category === selectedCategory);
                filtered.forEach(timer => {
                    const latest = timer.logs[0]; const relTime = latest ? formatTime(latest.timestamp) : null;
                    const card = document.createElement('div'); card.className = "bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-4";
                    let timeline = '';
                    if (timer.isExpanded && timer.logs.length > 0) {
                        timeline = `<div class="px-6 pb-6 pt-2 space-y-6 relative"><div class="timeline-line"></div>${timer.logs.map(log => {
                            const logTime = formatTime(log.timestamp);
                            return `<div class="relative pl-8 group"><div class="timeline-dot"></div><div class="flex justify-between items-start"><div class="flex-1" onclick="openModal('log', '${timer.id}', ${log.id})"><div class="flex items-center gap-2"><span class="text-sm font-black text-slate-700">${logTime.text}</span><span class="text-[10px] text-slate-400 font-medium">${new Date(log.timestamp).toLocaleDateString()}</span><svg class="w-3 h-3 text-slate-300 opacity-0 group-hover:opacity-100 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></div>${log.memo ? `<p class="text-[11px] text-slate-500 mt-1 bg-slate-50 p-2 rounded-lg border border-slate-100 leading-relaxed">${log.memo.replace(/\n/g, '<br>')}</p>` : ''}</div></div></div>`;
                        }).join('')}</div>`;
                    }
                    card.innerHTML = `<div class="p-5 flex justify-between items-start cursor-pointer hover:bg-slate-50 transition" onclick="toggleExpand('${timer.id}')"><div class="flex-1"><div class="flex items-center gap-2 mb-1"><span class="text-[9px] font-black uppercase px-2 py-0.5 bg-slate-100 text-slate-500 rounded">${timer.category}</span>${relTime ? `<span class="text-xs font-bold ${relTime.isFuture ? 'text-emerald-500' : 'text-sky-500'} mono">${relTime.text}</span>` : ''}<span class="text-[10px] text-slate-300 ml-2 font-bold">履歴 - ${timer.logs.length}</span></div><div class="flex items-center gap-2"><h2 class="text-lg font-bold text-slate-800 tracking-tight">${timer.title}</h2><button onclick="event.stopPropagation(); openModal('timer', '${timer.id}')" class="text-slate-300 hover:text-sky-500 transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></button></div>${timer.memo ? `<p class="text-[10px] text-slate-400 mt-1 line-clamp-1">${timer.memo}</p>` : ''}</div><div class="flex flex-col items-end gap-3" onclick="event.stopPropagation()"><button onclick="deleteTimer('${timer.id}')" class="text-slate-200 hover:text-red-400 transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button><button onclick="openModal('log', '${timer.id}')" class="w-10 h-10 bg-sky-50 text-sky-600 rounded-full flex items-center justify-center hover:bg-sky-500 hover:text-white transition shadow-sm"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M12 4v16m8-8H4"/></svg></button></div></div>${timeline}`;
                    container.appendChild(card);
                });
            }
            initAuth();
            setInterval(() => render(), 60000);
        }
    </script>
</body>
</html>
