<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline Context Manager Cloud Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .timeline-line { position: absolute; left: 7px; top: 0; bottom: 0; width: 2px; background-color: #e2e8f0; }
        .timeline-dot { position: absolute; left: 0; top: 6px; width: 16px; height: 16px; background-color: #0ea5e9; border: 3px solid #fff; border-radius: 50%; z-index: 10; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-900 pb-12">
    <!-- Login Overlay: Shown when not authenticated -->
    <div id="loginOverlay" class="fixed inset-0 bg-white z-[200] flex items-center justify-center p-6 hidden">
        <div class="max-w-sm w-full text-center">
            <h1 class="text-3xl font-black tracking-tighter text-slate-800 mb-2">Timeline Since</h1>
            <p class="text-sm text-slate-500 mb-8 leading-relaxed">複数端末での自動同期と、個人別の安全なデータ管理のためにGoogleアカウントでログインしてください。</p>
            <button onclick="signInWithGoogle()" class="w-full bg-white border-2 border-slate-200 text-slate-700 py-4 rounded-2xl font-bold shadow-sm hover:bg-slate-50 transition-all flex items-center justify-center gap-3 active:scale-95">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Googleで開始
            </button>
            <p class="text-[10px] text-slate-400 mt-6 tracking-widest uppercase italic">Secure Cloud Protocol Integrated</p>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="appRoot" class="hidden">
        <div class="max-w-xl mx-auto px-4 py-6">
            <header class="mb-6">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h1 class="text-2xl font-black tracking-tighter text-slate-800">Timeline Since</h1>
                        <p class="text-xs text-slate-500 font-medium italic" id="syncStatus">Syncing...</p>
                    </div>
                    <div class="flex flex-col items-end gap-1">
                        <button onclick="handleLogout()" class="text-[10px] text-slate-400 hover:text-red-500 underline mb-1">ログアウト</button>
                        <div class="text-[9px] text-slate-400 font-bold uppercase">Security: Private ID</div>
                        <button onclick="toggleUID()" class="text-[9px] font-mono text-slate-300 bg-slate-50 px-2 py-1 rounded border border-slate-100 hover:text-sky-500 transition-colors" id="uidContainer" title="これはこの端末固有のIDです。他人のデータは見えません。">••••••••••••••••</button>
                    </div>
                </div>

                <div class="flex gap-2 items-center mb-6">
                    <button onclick="openModal('timer')" class="flex-1 bg-sky-500 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-sky-100 hover:bg-sky-600 active:scale-[0.98] transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
                        新規作成
                    </button>
                    <button onclick="exportCSV()" class="p-3 bg-slate-800 text-white rounded-xl shadow-lg shadow-slate-200 hover:bg-slate-700 active:scale-95 transition-all" title="CSV出力">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    </button>
                    <button onclick="exportJSON()" class="p-3 bg-white border border-slate-200 text-slate-500 rounded-xl shadow-sm hover:bg-slate-50 active:scale-95 transition-all" title="物理バックアップ (JSON)">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                    </button>
                </div>

                <div id="categoryTabs" class="flex gap-2 overflow-x-auto pb-4 no-scrollbar"></div>
            </header>

            <div id="mainContainer" class="space-y-6"></div>
        </div>
    </div>

    <!-- Config Wizard: Visible if no configuration is provided -->
    <div id="setupWizard" class="hidden min-h-screen flex items-center justify-center p-4 bg-slate-50">
        <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-2xl border border-slate-100 text-center">
            <h2 class="text-2xl font-black text-slate-800 mb-4 leading-tight">Firebase Config Required</h2>
            <div class="mt-4 p-4 bg-blue-50 rounded-xl border border-blue-100 mb-6 text-[11px] text-blue-600 text-left leading-relaxed">
                手順：1.Firebase ConsoleでWebアプリを追加 2.表示された <code class="bg-blue-100 px-1">const firebaseConfig = { ... };</code> の中身をコピー 3.下の枠に貼り付け。
            </div>
            <textarea id="configInput" placeholder='{"apiKey": "...", "projectId": "...", ...}' class="w-full h-32 p-4 bg-slate-50 border border-slate-200 rounded-xl font-mono text-[10px] mb-4 outline-none resize-none focus:ring-2 focus:ring-sky-500"></textarea>
            <button onclick="saveFirebaseConfig()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold hover:bg-slate-700 transition-all shadow-lg active:scale-95">設定を保存して開始</button>
        </div>
    </div>

    <!-- Modals (Timer & Log) -->
    <div id="timerModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-[100] backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl">
            <h3 class="text-lg font-bold mb-4" id="timerModalTitle">新規タイマー</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">カテゴリ名</label>
                    <input type="text" id="newTimerCategory" list="existingCategories" class="w-full border-b-2 border-slate-100 py-2 outline-none text-sm bg-transparent">
                    <datalist id="existingCategories"></datalist>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">タイマー名</label>
                    <input type="text" id="newTimerTitle" class="w-full border-b-2 border-slate-100 py-2 outline-none text-sm">
                </div>
                <div id="initialDateGroup">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">1回目の日時設定</label>
                    <div class="flex gap-2 items-center">
                        <input type="datetime-local" id="newTimerInitialDate" class="flex-1 border-b-2 border-slate-100 py-2 outline-none text-sm">
                        <button type="button" class="px-3 py-1 bg-slate-100 text-slate-600 rounded-lg text-xs font-bold" onclick="document.activeElement.blur()">決定</button>
                    </div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mt-2 block">1回目のメモ</label>
                    <textarea id="newTimerInitialMemo" class="w-full border rounded-lg p-2 mt-1 text-sm h-16 resize-none outline-none border-slate-200" placeholder="空欄可"></textarea>
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="closeModal('timer')" class="flex-1 py-3 text-slate-500 font-bold">キャンセル</button>
                    <button id="timerSubmitBtn" onclick="createTimer()" class="flex-1 py-3 bg-slate-800 text-white rounded-xl font-bold active:scale-95 transition">保存</button>
                </div>
            </div>
        </div>
    </div>

    <div id="logModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-[100] backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl">
            <h3 class="text-lg font-bold mb-4" id="logModalTitle">履歴追加</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">日付</label>
                    <div class="flex gap-2 items-center">
                        <input type="datetime-local" id="newLogDate" class="flex-1 border-b-2 border-slate-100 py-2 outline-none text-sm">
                        <button type="button" class="px-3 py-1 bg-slate-100 text-slate-600 rounded-lg text-xs font-bold" onclick="document.activeElement.blur()">決定</button>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">メモ</label>
                    <textarea id="newLogMemo" class="w-full border rounded-lg p-2 mt-1 text-sm h-24 resize-none outline-none border-slate-200" placeholder="詳細な内容を記録..."></textarea>
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="closeModal('log')" class="flex-1 py-3 text-slate-500 font-bold">キャンセル</button>
                    <button id="logSubmitBtn" onclick="addLog()" class="flex-1 py-3 bg-sky-500 text-sky-600 font-bold rounded-xl border border-sky-100 active:scale-95 transition">追加</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot, query } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // ==========================================
        // ミナ様専用：Firebase Config 貼り付けエリア
        // ここに以前取得した { apiKey: ... } を貼り付けてください。
        // ==========================================
        const hardcodedConfig = {
            apiKey: "", 
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        function getFirebaseConfig() {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) return JSON.parse(__firebase_config);
            if (hardcodedConfig && hardcodedConfig.apiKey) return hardcodedConfig;
            const stored = localStorage.getItem('since_timer_cloud_config');
            if (stored) return JSON.parse(stored);
            return null;
        }

        const config = getFirebaseConfig();
        if (!config) {
            document.getElementById('setupWizard').classList.remove('hidden');
        } else {
            const app = initializeApp(config);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const provider = new GoogleAuthProvider();
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'since-timer-cloud';

            let data = [];
            let user = null;
            let selectedCategory = 'すべて';
            let currentEditingTimerId = null;
            let currentEditingLogId = null;
            let uidVisible = false;

            onAuthStateChanged(auth, (u) => {
                user = u;
                if (user) {
                    document.getElementById('loginOverlay').classList.add('hidden');
                    document.getElementById('appRoot').classList.remove('hidden');
                    document.getElementById('syncStatus').innerText = "Cloud Synced";
                    setupRealtimeSync();
                } else {
                    document.getElementById('appRoot').classList.add('hidden');
                    document.getElementById('loginOverlay').classList.remove('hidden');
                }
            });

            window.signInWithGoogle = async () => {
                try { await signInWithPopup(auth, provider); }
                catch (err) { alert("ログイン失敗: " + err.message); }
            };

            window.handleLogout = () => { if(confirm("ログアウトしますか？")) signOut(auth); };

            window.toggleUID = () => {
                const el = document.getElementById('uidContainer');
                uidVisible = !uidVisible;
                el.innerText = uidVisible ? 'ID: ' + user.uid : 'Device ID: ••••••••';
            };

            function setupRealtimeSync() {
                const q = query(collection(db, 'artifacts', appId, 'users', user.uid, 'timers'));
                onSnapshot(q, (snapshot) => {
                    data = snapshot.docs.map(doc => ({ docId: doc.id, ...doc.data() }));
                    renderCategories(); render();
                }, (err) => { 
                    document.getElementById('syncStatus').innerText = "Access Error (Check Rules)";
                    document.getElementById('syncStatus').style.color = "#ef4444";
                });
            }

            window.openModal = (type, id = null, logId = null) => {
                document.getElementById(`${type}Modal`).style.display = 'flex';
                currentEditingTimerId = id; currentEditingLogId = logId;
                const now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                const ds = now.toISOString().slice(0, 16);
                if (type === 'timer') {
                    updateCategoryDatalist();
                    if (id) {
                        const t = data.find(t => t.id === id.toString());
                        document.getElementById('timerModalTitle').innerText = "タイマーを編集";
                        document.getElementById('newTimerTitle').value = t.title;
                        document.getElementById('newTimerCategory').value = t.category;
                        document.getElementById('initialDateGroup').style.display = "none";
                        document.getElementById('timerSubmitBtn').setAttribute('onclick', 'updateTimer()');
                    } else {
                        document.getElementById('timerModalTitle').innerText = "新規タイマー";
                        document.getElementById('newTimerTitle').value = ""; document.getElementById('newTimerCategory').value = "";
                        document.getElementById('newTimerInitialDate').value = ds; document.getElementById('initialDateGroup').style.display = "block";
                        document.getElementById('timerSubmitBtn').setAttribute('onclick', 'createTimer()');
                    }
                }
                if (type === 'log') {
                    if (logId) {
                        const t = data.find(t => t.id === id.toString()); const l = t.logs.find(l => l.id === logId);
                        const ld = new Date(l.timestamp); ld.setMinutes(ld.getMinutes() - ld.getTimezoneOffset());
                        document.getElementById('logModalTitle').innerText = "履歴を編集";
                        document.getElementById('newLogDate').value = ld.toISOString().slice(0, 16);
                        document.getElementById('newLogMemo').value = l.memo || "";
                        document.getElementById('logSubmitBtn').setAttribute('onclick', 'updateLog()');
                    } else {
                        document.getElementById('logModalTitle').innerText = "履歴追加";
                        document.getElementById('newLogDate').value = ds; document.getElementById('newLogMemo').value = "";
                        document.getElementById('logSubmitBtn').setAttribute('onclick', 'addLog()');
                    }
                }
            };

            window.closeModal = (type) => { document.getElementById(`${type}Modal`).style.display = 'none'; };

            window.createTimer = async () => {
                const title = document.getElementById('newTimerTitle').value.trim();
                const cat = document.getElementById('newTimerCategory').value.trim() || '未分類';
                const date = document.getElementById('newTimerInitialDate').value;
                const memo = document.getElementById('newTimerInitialMemo').value.trim();
                if (!title) return;
                const nid = Date.now().toString();
                const timerData = { id: nid, title, category: cat, isExpanded: true, logs: date ? [{ id: Date.now()+1, timestamp: new Date(date).getTime(), memo }] : [] };
                await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'timers', nid), timerData);
                closeModal('timer');
            };

            window.updateTimer = async () => {
                const title = document.getElementById('newTimerTitle').value.trim();
                const cat = document.getElementById('newTimerCategory').value.trim() || '未分類';
                await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'timers', currentEditingTimerId.toString()), { title, category: cat });
                closeModal('timer');
            };

            window.addLog = async () => {
                const ds = document.getElementById('newLogDate').value;
                const memo = document.getElementById('newLogMemo').value.trim();
                if (!ds) return;
                const t = data.find(t => t.id === currentEditingTimerId.toString());
                if (t) {
                    const logs = [...t.logs, { id: Date.now(), timestamp: new Date(ds).getTime(), memo }].sort((a,b) => b.timestamp - a.timestamp);
                    await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'timers', t.id), { logs, isExpanded: true });
                    closeModal('log');
                }
            };

            window.updateLog = async () => {
                const ds = document.getElementById('newLogDate').value;
                const memo = document.getElementById('newLogMemo').value.trim();
                const t = data.find(t => t.id === currentEditingTimerId.toString());
                const logs = t.logs.map(l => l.id === currentEditingLogId ? { ...l, timestamp: new Date(ds).getTime(), memo } : l).sort((a,b) => b.timestamp - a.timestamp);
                await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'timers', t.id), { logs, isExpanded: true });
                closeModal('log');
            };

            window.deleteTimer = async (id) => { if(confirm('完全に削除しますか？')) await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'timers', id.toString())); };
            window.toggleExpand = async (id) => { const t = data.find(t => t.id === id.toString()); await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'timers', id.toString()), { isExpanded: !t.isExpanded }); };
            window.filterCategory = (cat) => { selectedCategory = cat; renderCategories(); render(); };

            window.exportCSV = () => {
                const header = ["Category", "Title", "LogDate", "LogMemo"];
                const rows = [];
                data.forEach(t => t.logs.forEach(l => rows.push([t.category, t.title, new Date(l.timestamp).toISOString(), l.memo])));
                const csv = "\uFEFF" + [header.join(","), ...rows.map(r => r.map(v => `"${(v||"").toString().replace(/"/g,'""')}"`).join(","))].join("\n");
                const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' })); a.download = `timer_export.csv`; a.click();
            };

            window.exportJSON = () => {
                const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' })); a.download = `timer_backup.json`; a.click();
            };

            function updateCategoryDatalist() { const cats = [...new Set(data.map(t => t.category))].filter(c => c !== '未分類'); document.getElementById('existingCategories').innerHTML = cats.map(c => `<option value="${c}">`).join(''); }
            function renderCategories() { const cats = ['すべて', ...new Set(data.map(t => t.category))].sort(); document.getElementById('categoryTabs').innerHTML = cats.map(cat => `<button onclick="filterCategory('${cat}')" class="${selectedCategory === cat ? 'bg-slate-800 text-white' : 'bg-white text-slate-500 border border-slate-200'} px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition shadow-sm">${cat}</button>`).join(''); }
            function formatTime(ms) { 
                const diff = Date.now() - ms; const abs = Math.abs(diff); const days = Math.floor(abs / 86400000); 
                const y = Math.floor(days / 365); const m = Math.floor((totalDays % 365) / 30.44); const d = Math.floor(totalDays % 30.44);
                let res = []; if(y > 0) res.push(`${y}y`); if(m > 0) res.push(`${m}m`); if(d > 0 || res.length === 0) res.push(`${d}d`);
                return { text: res.join(' ') + (diff >= 0 ? ' ago' : ' later'), isFuture: diff < 0 };
            }

            function render() {
                const container = document.getElementById('mainContainer'); container.innerHTML = '';
                const filtered = selectedCategory === 'すべて' ? data : data.filter(t => t.category === selectedCategory);
                filtered.forEach(timer => {
                    const latest = timer.logs[0];
                    const diff = latest ? Date.now() - latest.timestamp : 0;
                    const abs = Math.abs(diff);
                    const days = Math.floor(abs / 86400000);
                    const y = Math.floor(days / 365); const m = Math.floor((days % 365) / 30.44); const d = Math.floor(days % 30.44);
                    let relText = (y > 0 ? y + 'y ' : '') + (m > 0 ? m + 'm ' : '') + (d + 'd');
                    relText += diff >= 0 ? ' ago' : ' later';
                    const isFuture = diff < 0;

                    const card = document.createElement('div'); card.className = "bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-4";
                    let timeline = '';
                    if (timer.isExpanded && timer.logs.length > 0) {
                        timeline = `<div class="px-6 pb-6 pt-2 space-y-6 relative"><div class="timeline-line"></div>${timer.logs.map(log => {
                            const ldiff = Date.now() - log.timestamp;
                            const ldays = Math.floor(Math.abs(ldiff) / 86400000);
                            const ly = Math.floor(ldays / 365); const lm = Math.floor((ldays % 365) / 30.44); const ld = Math.floor(ldays % 30.44);
                            const lt = (ly > 0 ? ly + 'y ' : '') + (lm > 0 ? lm + 'm ' : '') + (ld + 'd') + (ldiff >= 0 ? ' ago' : ' later');
                            return `<div class="relative pl-8 group" onclick="event.stopPropagation(); openModal('log', '${timer.id}', ${log.id})"><div class="timeline-dot"></div><div class="flex items-center gap-2"><span class="text-sm font-black text-slate-700">${lt}</span><span class="text-[10px] text-slate-400 font-medium">${new Date(log.timestamp).toLocaleDateString()}</span></div>${log.memo ? `<p class="text-[11px] text-slate-500 mt-1 bg-slate-50 p-2 rounded-lg border border-slate-100">${log.memo.replace(/\n/g, '<br>')}</p>` : ''}</div>`;
                        }).join('')}</div>`;
                    }
                    card.innerHTML = `<div class="p-5 flex justify-between items-start cursor-pointer hover:bg-slate-50 transition" onclick="toggleExpand('${timer.id}')"><div class="flex-1"><div class="flex items-center gap-2 mb-1"><span class="text-[9px] font-black uppercase px-2 py-0.5 bg-slate-100 text-slate-500 rounded">${timer.category}</span>${latest ? `<span class="text-xs font-bold ${isFuture ? 'text-emerald-500' : 'text-sky-500'} mono">${relText}</span>` : ''}</div><div class="flex items-center gap-2"><h2 class="text-lg font-bold text-slate-800 tracking-tight">${timer.title}</h2><button onclick="event.stopPropagation(); openModal('timer', '${timer.id}')" class="text-slate-300 hover:text-sky-500 transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></button></div></div><div class="flex flex-col items-end gap-3" onclick="event.stopPropagation()"><button onclick="deleteTimer('${timer.id}')" class="text-slate-200 hover:text-red-400 transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button><button onclick="openModal('log', '${timer.id}')" class="w-10 h-10 bg-sky-50 text-sky-600 rounded-full flex items-center justify-center hover:bg-sky-500 hover:text-white transition shadow-sm"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M12 4v16m8-8H4"/></svg></button></div></div>${timeline}`;
                    container.appendChild(card);
                });
            }
            setInterval(() => render(), 60000);
        }

        window.saveFirebaseConfig = () => {
            const input = document.getElementById('configInput').value.trim();
            const match = input.match(/\{[\s\S]*\}/);
            if (match) { 
                let json = match[0].replace(/([{,])\s*([a-zA-Z0-9]+)\s*:/g, '$1"$2":').replace(/:\s*'([^']*)'/g, ':"$1"').replace(/,\s*([}\]])/g, '$1');
                localStorage.setItem('since_timer_cloud_config', json); location.reload(); 
            }
        };
    </script>
</body>
</html>
