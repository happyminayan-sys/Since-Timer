<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline Context Manager Cloud Pro (Multi-Metric Dashboard)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .timeline-line { position: absolute; left: 7px; top: 0; bottom: 0; width: 2px; background-color: #cbd5e1; }
        .timeline-dot { position: absolute; left: 0; top: 6px; width: 16px; height: 16px; background-color: #0ea5e9; border: 3px solid #fff; border-radius: 50%; z-index: 10; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .img-preview { max-height: 120px; object-fit: cover; border-radius: 8px; }
        .color-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
        .color-dot.active { border-color: #334155; transform: scale(1.1); box-shadow: 0 0 0 2px #fff; }
        .circle-progress { transform: rotate(-90deg); transform-origin: 50% 50%; }
        .progress-indicator { transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="text-slate-900 pb-12">
    <!-- Login Overlay -->
    <div id="loginOverlay" class="fixed inset-0 bg-white z-[200] flex items-center justify-center p-6 hidden">
        <div class="max-w-sm w-full text-center">
            <h1 class="text-3xl font-black tracking-tighter text-slate-800 mb-2">Timeline Since</h1>
            <p class="text-sm text-slate-500 mb-8 leading-relaxed">安全なデータ管理のためにGoogleでログインしてください。</p>
            <button onclick="signInWithGoogle()" class="w-full bg-white border-2 border-slate-200 text-slate-700 py-4 rounded-2xl font-bold shadow-sm hover:bg-slate-50 transition-all flex items-center justify-center gap-3 active:scale-95">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Googleで開始
            </button>
        </div>
    </div>

    <div id="appRoot" class="hidden">
        <div class="max-w-xl mx-auto px-4 py-6">
            <header class="mb-4">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h1 class="text-2xl font-black tracking-tighter text-slate-800">Timeline Since</h1>
                        <p class="text-xs text-slate-500 font-medium italic" id="syncStatus">Syncing...</p>
                    </div>
                    <button onclick="handleLogout()" class="text-[10px] text-slate-400 hover:text-red-500 underline">ログアウト</button>
                </div>

                <div class="bg-slate-900 rounded-3xl p-6 mb-6 shadow-2xl relative border-t border-white/10">
                    <button onclick="openModal('settings')" class="absolute top-4 right-4 text-slate-500 hover:text-white transition z-10">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    </button>
                    <div id="dashboardTabs" class="flex gap-4 mb-4 border-b border-white/10 pb-2 mr-8 overflow-x-auto no-scrollbar"></div>
                    <div id="dashboardContent" class="text-center py-2 flex flex-col items-center min-h-[170px] justify-center"></div>
                </div>

                <div class="flex gap-2 items-center mb-6">
                    <button onclick="openModal('timer')" class="flex-1 bg-sky-500 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-sky-100 hover:bg-sky-600 active:scale-95 transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
                        新規作成
                    </button>
                    <button onclick="exportCSV()" class="p-3 bg-slate-800 text-white rounded-xl shadow-lg shadow-slate-200 hover:bg-slate-700 active:scale-95 transition-all"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></button>
                    <label class="p-3 bg-white border border-slate-200 text-slate-500 rounded-xl shadow-sm hover:bg-slate-50 active:scale-95 transition-all cursor-pointer">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                        <input type="file" class="hidden" accept=".csv" onchange="importSpreadsheetCSV(event)">
                    </label>
                    <button onclick="exportJSON()" class="p-3 bg-white border border-slate-200 text-slate-500 rounded-xl shadow-sm hover:bg-slate-50 active:scale-95 transition-all"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg></button>
                    <label class="p-3 bg-white border border-slate-200 text-slate-500 rounded-xl shadow-sm hover:bg-slate-50 active:scale-95 transition-all cursor-pointer">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l4 4m-4-4h12"/></svg>
                        <input type="file" class="hidden" accept=".json" onchange="importJSON(event)">
                    </label>
                </div>

                <div id="categoryTabs" class="flex gap-2 overflow-x-auto no-scrollbar mb-4"></div>
            </header>
            <div id="mainContainer" class="space-y-4"></div>
        </div>
    </div>

    <!-- Modals -->
    <div id="timerModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-[100] backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl text-left">
            <h3 class="text-lg font-bold mb-4 text-slate-800" id="timerModalTitle">タイマー設定</h3>
            <div class="space-y-4">
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">カテゴリ</label><input type="text" id="newTimerCategory" list="existingCategories" class="w-full border-b-2 border-slate-100 py-2 outline-none text-sm bg-transparent"><datalist id="existingCategories"></datalist></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">タイトル</label><input type="text" id="newTimerTitle" class="w-full border-b-2 border-slate-100 py-2 outline-none text-sm"></div>
                <div class="flex gap-4">
                    <div class="flex-1"><label class="text-[10px] font-bold text-slate-400 uppercase">背景色</label><div class="flex gap-2 mt-2 flex-wrap" id="colorPicker"><div class="color-dot active bg-white border-slate-400" data-color="default"></div><div class="color-dot bg-white border-slate-200 shadow-inner" data-color="white"></div><div class="color-dot bg-indigo-200" data-color="indigo"></div><div class="color-dot bg-orange-200" data-color="orange"></div><div class="color-dot bg-emerald-200" data-color="emerald"></div><div class="color-dot bg-rose-200" data-color="rose"></div></div></div>
                    <div class="w-24"><label class="text-[10px] font-bold text-slate-400 uppercase">アラート（日）</label><input type="number" id="newTimerAlertDays" placeholder="0" class="w-full border-b-2 border-slate-100 py-2 outline-none text-sm text-center"></div>
                </div>
                <div id="initialDateGroup"><label class="text-[10px] font-bold text-slate-400 uppercase">初回日時</label><input type="datetime-local" id="newTimerInitialDate" class="w-full border-b-2 border-slate-100 py-2 outline-none text-sm"><label class="text-[10px] font-bold text-slate-400 uppercase mt-2 block">メモ</label><textarea id="newTimerInitialMemo" class="w-full border rounded-lg p-2 mt-1 text-sm h-16 resize-none border-slate-200"></textarea></div>
                <div class="flex gap-2 pt-2"><button onclick="closeModal('timer')" class="flex-1 py-3 text-slate-500 font-bold">中止</button><button id="timerSubmitBtn" class="flex-1 py-3 bg-slate-800 text-white rounded-xl font-bold shadow-lg">保存</button></div>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-[100] backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl text-left overflow-y-auto max-h-[90vh] no-scrollbar">
            <h3 class="text-lg font-bold mb-4 text-slate-800 tracking-tight">目標・ライフプラン設定</h3>
            <div class="space-y-6">
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase">生年月日</label><input type="date" id="settingsBirthDate" class="w-full border-b-2 border-slate-100 py-2 outline-none text-sm"></div>
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase">寿命目安</label><input type="number" id="settingsExpectedAge" class="w-full border-b-2 border-slate-100 py-2 outline-none text-sm"></div>
                </div>

                <div class="pt-4 border-t border-slate-100">
                    <label class="text-[10px] font-black text-slate-500 uppercase flex justify-between items-center mb-2">
                        <span>資産・ダイエット等の自由目標</span>
                        <button onclick="addNewGoalRow()" class="text-sky-500 hover:text-sky-600 text-[10px] font-bold">+ 目標を追加</button>
                    </label>
                    <div id="goalRowsContainer" class="space-y-4"></div>
                </div>

                <div class="flex gap-2 pt-4">
                    <button onclick="closeModal('settings')" class="flex-1 py-3 text-slate-500 font-bold">閉じる</button>
                    <button onclick="saveProfileSettings()" class="flex-1 py-3 bg-amber-500 text-white rounded-xl font-bold">設定を適用</button>
                </div>
            </div>
        </div>
    </div>

    <div id="logModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-[100] backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl text-left">
            <h3 class="text-lg font-bold mb-4 text-slate-800" id="logModalTitle">履歴追加</h3>
            <div class="space-y-4">
                <input type="datetime-local" id="newLogDate" class="w-full border-b-2 border-slate-100 py-2 outline-none text-sm">
                <div class="grid grid-cols-2 gap-2 mt-1">
                    <label class="flex flex-col items-center justify-center gap-1 py-3 border-2 border-dashed border-slate-200 rounded-xl text-slate-500 cursor-pointer hover:bg-slate-50 transition active:scale-95"><svg class="w-6 h-6 text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg><span class="text-[10px] font-bold">撮影</span><input type="file" class="hidden" accept="image/*" capture="environment" onchange="handlePhotoSelect(event)"></label>
                    <label class="flex flex-col items-center justify-center gap-1 py-3 border-2 border-dashed border-slate-200 rounded-xl text-slate-500 cursor-pointer hover:bg-slate-50 transition active:scale-95"><svg class="w-6 h-6 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><span class="text-[10px] font-bold">選択</span><input type="file" class="hidden" accept="image/*" onchange="handlePhotoSelect(event)"></label>
                </div>
                <div id="photoPreviewContainer" class="hidden relative"><img id="photoPreview" class="w-full h-32 object-cover rounded-lg border"><button onclick="removeSelectedPhoto()" class="absolute top-1 right-1 bg-black/50 text-white rounded-full p-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button></div>
                <textarea id="newLogMemo" class="w-full border rounded-lg p-2 text-sm h-24 resize-none border-slate-200" placeholder="メモを入力"></textarea>
                <div class="flex gap-2 pt-2"><button onclick="closeModal('log')" class="flex-1 py-3 text-slate-500 font-bold">中止</button><button id="logSubmitBtn" onclick="addLog()" class="flex-1 py-3 bg-sky-50 text-sky-600 font-bold rounded-xl border border-sky-100">確定</button></div>
            </div>
        </div>
    </div>

    <div id="deleteModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-[150] backdrop-blur-sm"><div class="bg-white rounded-2xl w-full max-w-xs p-6 shadow-2xl text-center"><h3 class="text-lg font-bold text-slate-800 mb-2" id="deleteTargetName">削除確認</h3><div class="flex gap-2 mt-6"><button onclick="closeModal('delete')" class="flex-1 py-3 text-slate-500 font-bold">中止</button><button id="deleteExecuteBtn" class="flex-1 py-3 bg-red-500 text-white rounded-xl font-bold">削除する</button></div></div></div>
    <div id="imageModal" class="fixed inset-0 bg-black/90 hidden items-center justify-center p-4 z-[250]" onclick="closeModal('image')"><img id="imageModalContent" class="max-w-full max-h-full rounded-lg"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot, query, getDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = { apiKey: "AIzaSyC6TKgRNRFhm023uAtTnXyJXHcQtO4i4nA", authDomain: "timer-d7f73.firebaseapp.com", projectId: "timer-d7f73", storageBucket: "timer-d7f73.firebasestorage.app", messagingSenderId: "779981072804", appId: "1:779981072804:web:62bcfad1b1bbe392993931", measurementId: "G-3W7X6BDZRG" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);
        const provider = new GoogleAuthProvider(); provider.setCustomParameters({ prompt: 'select_account' });
        const currentAppId = typeof __app_id !== 'undefined' ? __app_id : 'since-timer-cloud';

        let data = []; let user = null; let selectedCategory = 'すべて'; let sortMode = 'recent'; let dashboardTab = 'day'; 
        let currentSelectedPhotoBase64 = null; let currentSelectedColor = 'default'; let currentEditingTimerId = null; let currentEditingLogId = null;

        // Logical Default: Includes both Financial and Health metrics
        let lifePlan = {
            birthDate: "1967-12-08",
            expectedAge: 90,
            goals: [
                { id: 'g1', title: "資産目標", startValue: 1000000, current: 35000000, target: 50000000, unit: "円", startDate: "2024-01-01", endDate: "2029-12-08" },
                { id: 'g2', title: "ダイエット", startValue: 55, current: 52, target: 48, unit: "kg", startDate: "2026-01-01", endDate: "2026-12-31" }
            ]
        };

        onAuthStateChanged(auth, async (u) => {
            if (u && !u.isAnonymous) { user = u; document.getElementById('loginOverlay').classList.add('hidden'); document.getElementById('appRoot').classList.remove('hidden'); await loadProfileSettings(); setupRealtimeSync(); }
            else { if (u && u.isAnonymous) await signOut(auth); user = null; document.getElementById('appRoot').classList.add('hidden'); document.getElementById('loginOverlay').classList.remove('hidden'); }
        });

        window.signInWithGoogle = async () => { try { await signInWithPopup(auth, provider); } catch (err) { alert("失敗: " + err.message); } };
        window.handleLogout = () => { if(confirm("ログアウトしますか？")) signOut(auth); };

        async function loadProfileSettings() {
            const snap = await getDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'settings', 'config'));
            if (snap.exists()) { lifePlan = { ...lifePlan, ...snap.data() }; if (!Array.isArray(lifePlan.goals)) lifePlan.goals = []; }
        }

        window.addNewGoalRow = () => {
            const container = document.getElementById('goalRowsContainer'); const id = 'g' + Date.now();
            const div = document.createElement('div'); div.className = "p-3 bg-slate-100 rounded-xl space-y-2 relative goal-row shadow-sm"; div.dataset.id = id;
            div.innerHTML = `
                <button onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-slate-400 hover:text-red-500 text-sm">×</button>
                <div class="flex gap-2">
                    <input type="text" placeholder="目標名" class="flex-1 border-b border-white py-1 outline-none text-xs bg-transparent font-bold goal-title-input">
                    <input type="text" placeholder="単位 (kg/円)" class="w-16 border-b border-white py-1 outline-none text-xs bg-transparent goal-unit-input">
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <div class="flex flex-col"><label class="text-[8px] text-slate-400">開始値</label><input type="number" step="any" class="bg-transparent border-b border-white text-[10px] outline-none goal-start-val-input"></div>
                    <div class="flex flex-col"><label class="text-[8px] text-slate-400">現在値</label><input type="number" step="any" class="bg-transparent border-b border-white text-[10px] outline-none goal-current-val-input"></div>
                    <div class="flex flex-col"><label class="text-[8px] text-slate-400">目標値</label><input type="number" step="any" class="bg-transparent border-b border-white text-[10px] outline-none goal-target-val-input"></div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div class="flex flex-col"><label class="text-[8px] text-slate-400">開始日</label><input type="date" class="bg-transparent text-[10px] outline-none goal-start-date-input"></div>
                    <div class="flex flex-col"><label class="text-[8px] text-slate-400">期日</label><input type="date" class="bg-transparent text-[10px] outline-none goal-end-date-input"></div>
                </div>
            `;
            container.appendChild(div);
        };

        window.saveProfileSettings = async () => {
            const birth = document.getElementById('settingsBirthDate').value; const exp = parseInt(document.getElementById('settingsExpectedAge').value);
            const goals = []; document.querySelectorAll('.goal-row').forEach(row => {
                const title = row.querySelector('.goal-title-input').value; if (!title) return;
                goals.push({
                    id: row.dataset.id, title, unit: row.querySelector('.goal-unit-input').value || "",
                    startValue: parseFloat(row.querySelector('.goal-start-val-input').value) || 0,
                    current: parseFloat(row.querySelector('.goal-current-val-input').value) || 0,
                    target: parseFloat(row.querySelector('.goal-target-val-input').value) || 0,
                    startDate: row.querySelector('.goal-start-date-input').value,
                    endDate: row.querySelector('.goal-end-date-input').value
                });
            });
            lifePlan = { birthDate: birth, expectedAge: exp, goals };
            await setDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'settings', 'config'), lifePlan);
            closeModal('settings'); changeDashboardTab('day'); render();
        };

        function setupRealtimeSync() { const q = query(collection(db, 'artifacts', currentAppId, 'users', user.uid, 'timers')); onSnapshot(q, (snapshot) => { data = snapshot.docs.map(doc => ({ docId: doc.id, ...doc.data() })); renderCategories(); render(); }); }

        function formatRelativeTime(ms) {
            const diff = Date.now() - ms, abs = Math.abs(diff), days = Math.floor(abs / 86400000);
            return { text: (days >= 1 ? days + "日" : "今日"), actionLabel: (diff < 0 ? `あと ${days}日` : `${days}日経過`), isFuture: diff < 0, totalDays: days };
        }

        window.changeDashboardTab = (id) => { dashboardTab = id; renderTabs(); renderDashboard(); };

        function renderTabs() {
            const container = document.getElementById('dashboardTabs');
            const standard = [{ id: 'day', label: '今日' }, { id: 'year', label: '今年' }, { id: 'life', label: '人生' }];
            const goals = (lifePlan.goals || []).map(g => ({ id: g.id, label: g.title }));
            const allTabs = [...standard, ...goals];
            container.innerHTML = allTabs.map(t => {
                const isActive = dashboardTab === t.id; let col = isActive ? 'text-sky-400 border-b-2 border-sky-400' : 'text-slate-400';
                if (isActive && !['day','year','life'].includes(t.id)) col = 'text-amber-400 border-b-2 border-amber-400';
                return `<button onclick="changeDashboardTab('${t.id}')" class="text-[10px] font-bold px-2 pb-1 whitespace-nowrap transition-all ${col}">${t.label}</button>`;
            }).join('');
        }

        function renderDashboard() {
            const content = document.getElementById('dashboardContent'); if(!content) return;
            const now = new Date(), birth = new Date(lifePlan.birthDate);
            let percent = 0, title = "", mainVal = "", subVal = "", colorClass = "stroke-sky-500", timePercent = -1, isGoal = false;

            if (dashboardTab === 'day') {
                const used = (now - new Date(now.getFullYear(), now.getMonth(), now.getDate())) / 1000;
                percent = Math.floor(((86400 - used) / 86400) * 100); title = "残り今日"; colorClass = "stroke-sky-400";
                mainVal = `${Math.floor((86400-used)/3600)}時 ${Math.floor(((86400-used)%3600)/60)}分`; subVal = `使った今日: ${Math.floor(used/3600)}時 ${Math.floor((used%3600)/60)}分`;
            } else if (dashboardTab === 'year') {
                const start = new Date(now.getFullYear(), 0, 1), end = new Date(now.getFullYear() + 1, 0, 1);
                percent = Math.max(0, Math.floor(((end - now) / (end - start)) * 100)); title = "残り今年"; colorClass = "stroke-indigo-500";
                mainVal = `${Math.floor((end-now)/86400000)}日`; subVal = `使った今年: ${Math.floor((now-start)/86400000)}日`;
            } else if (dashboardTab === 'life') {
                const total = lifePlan.expectedAge * 365.25, used = (now - birth) / 86400000;
                percent = Math.max(0, Math.floor(((total - used) / total) * 100)); title = `残り人生 (${lifePlan.expectedAge}歳迄)`; colorClass = "stroke-purple-500";
                mainVal = `${Math.floor(total - used)}日`; subVal = `使った人生: ${Math.floor(used)}日`;
            } else {
                const g = (lifePlan.goals || []).find(x => x.id === dashboardTab);
                if (g) {
                    isGoal = true; const start = new Date(g.startDate), end = new Date(g.endDate);
                    // Goal Logic: Progress = (current - startValue) / (target - startValue)
                    const divisor = (g.target - g.startValue);
                    percent = divisor !== 0 ? Math.floor(((g.current - g.startValue) / divisor) * 100) : 0;
                    percent = Math.min(100, Math.max(0, percent));
                    timePercent = Math.min(100, Math.max(0, Math.floor(((now - start) / (end - start)) * 100)));
                    title = g.title; mainVal = `達成 ${percent}%`; 
                    subVal = `目標: ${g.target.toLocaleString()}${g.unit} / 現在: ${g.current.toLocaleString()}${g.unit}`;
                    colorClass = (percent >= timePercent) ? "stroke-emerald-500" : "stroke-rose-500";
                }
            }

            const r = 45, circ = 2 * Math.PI * r, offset = circ - (percent / 100) * circ, timeOffset = timePercent >= 0 ? circ - (timePercent / 100) * circ : 0;
            content.innerHTML = `<div class="relative inline-block"><svg width="110" height="110" class="circle-progress"><circle cx="55" cy="55" r="${r}" stroke="#1e293b" stroke-width="12" fill="transparent" />${timePercent >= 0 ? `<circle cx="55" cy="55" r="${r}" stroke="#334155" stroke-width="4" stroke-dasharray="${circ}" stroke-dashoffset="${timeOffset}" fill="transparent" />` : ''}<circle cx="55" cy="55" r="${r}" class="progress-indicator ${colorClass}" stroke-width="12" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round" fill="transparent" /></svg><div class="absolute inset-0 flex flex-col items-center justify-center"><span class="text-2xl font-black text-white">${percent}<span class="text-xs">%</span></span><span class="text-[8px] text-slate-400 uppercase font-bold tracking-widest">${isGoal ? '達成' : '残り'}</span></div></div><div class="mt-4"><p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest leading-none mb-1">${title}</p><h2 class="text-2xl font-black text-white tracking-tighter">${mainVal}</h2><p class="text-[9px] font-bold text-slate-500 mt-1">${subVal}</p></div>`;
        }

        window.handlePhotoSelect = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader(); reader.onload = (ev) => {
                const img = new Image(); img.onload = () => {
                    const canvas = document.createElement('canvas'); const MAX = 800; let w = img.width, h = img.height; if (w > MAX) { h *= MAX / w; w = MAX; }
                    canvas.width = w; canvas.height = h; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
                    currentSelectedPhotoBase64 = canvas.toDataURL('image/jpeg', 0.7); document.getElementById('photoPreview').src = currentSelectedPhotoBase64; document.getElementById('photoPreviewContainer').classList.remove('hidden');
                }; img.src = ev.target.result;
            }; reader.readAsDataURL(file);
        };
        window.removeSelectedPhoto = () => { currentSelectedPhotoBase64 = null; document.getElementById('photoPreview').src = ""; document.getElementById('photoPreviewContainer').classList.add('hidden'); };
        document.querySelectorAll('.color-dot').forEach(dot => { dot.onclick = () => { document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active')); dot.classList.add('active'); currentSelectedColor = dot.dataset.color; }; });

        window.importSpreadsheetCSV = async (e) => {
            const f = e.target.files[0]; if (!f) return;
            const reader = new FileReader(); reader.onload = async (ev) => {
                const buffer = ev.target.result; let text = new TextDecoder("utf-8").decode(buffer); if (text.includes('\uFFFD')) text = new TextDecoder("shift-jis").decode(buffer);
                const lines = text.split(/\r?\n/).filter(l => l.trim() !== ""); let localDataRef = [...data], processedCount = 0;
                for (const line of lines) { try { const cols = line.split(",").map(c => c.trim().replace(/^"|"$/g, '')); if (cols.length < 3) continue; const cat = cols[0] || "未分類", title = cols[1], ts = new Date(cols[2]).getTime(); if (!title || isNaN(ts)) continue; let timer = localDataRef.find(t => t.title === title && t.category === cat); if (timer) { if (!timer.logs.some(l => Math.abs(l.timestamp - ts) < 1000)) { timer.logs.push({ id: Date.now() + Math.random(), timestamp: ts, memo: cols[3] || "" }); timer.logs.sort((a,b) => b.timestamp - a.timestamp); await updateDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'timers', timer.id), { logs: timer.logs }); processedCount++; } } else { const nid = (Date.now() + Math.random()).toString(), nt = { id: nid, title, category: cat, color: 'default', alertDays: 0, isExpanded: false, logs: [{ id: Date.now() + Math.random(), timestamp: ts, memo: cols[3] || "" }] }; localDataRef.push(nt); await setDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'timers', nid), nt); processedCount++; } } catch (err) {} }
                alert(`${processedCount}件統合。`);
            }; reader.readAsArrayBuffer(f);
        };
        window.importJSON = async (e) => {
            const f = e.target.files[0]; if (!f || !confirm("復元しますか？")) return;
            const reader = new FileReader(); reader.onload = async (ev) => { try { const imported = JSON.parse(ev.target.result); if (Array.isArray(imported)) { for (const t of imported) { const docId = (t.id || Date.now() + Math.random()).toString(); await setDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'timers', docId), t); } alert('復元完了。'); } } catch (err) { alert('失敗'); } }; reader.readAsText(f);
        };
        window.exportJSON = () => { const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' })); a.download = `timer_backup.json`; a.click(); };
        window.exportCSV = () => { const header = ["Category", "Title", "LogDate", "LogMemo"], rows = []; data.forEach(t => t.logs.forEach(l => { rows.push([t.category, t.title, new Date(l.timestamp).toLocaleString('ja-JP').replace(/\//g, '-'), l.memo]); })); const csv = "\uFEFF" + [header.join(","), ...rows.map(r => r.map(v => `"${(v||"").toString().replace(/"/g,'""')}"`).join(","))].join("\n"); const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' })); a.download = `timer_export.csv`; a.click(); };

        window.openModal = (type, id = null, logId = null) => {
            document.getElementById(`${type}Modal`).style.display = 'flex'; currentEditingTimerId = id; currentEditingLogId = logId;
            const offset = new Date().getTimezoneOffset() * 60000, ds = new Date(Date.now() - offset).toISOString().slice(0, 16);
            if (type === 'timer') {
                updateCategoryList(); document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                if (id) { const t = data.find(t => t.id === id.toString()); document.getElementById('timerModalTitle').innerText = "設定編集"; document.getElementById('newTimerTitle').value = t.title; document.getElementById('newTimerCategory').value = t.category; document.getElementById('newTimerAlertDays').value = t.alertDays || 0; currentSelectedColor = t.color || 'default'; document.querySelector(`[data-color="${currentSelectedColor}"]`).classList.add('active'); document.getElementById('initialDateGroup').style.display = "none"; document.getElementById('timerSubmitBtn').onclick = updateTimer; }
                else { document.getElementById('timerModalTitle').innerText = "新規作成"; document.getElementById('newTimerTitle').value = ""; document.getElementById('newTimerCategory').value = ""; document.getElementById('newTimerAlertDays').value = ""; document.getElementById('newTimerInitialDate').value = ds; document.getElementById('initialDateGroup').style.display = "block"; currentSelectedColor = 'default'; document.querySelector(`[data-color="default"]`).classList.add('active'); document.getElementById('timerSubmitBtn').onclick = createTimer; }
            }
            if (type === 'log') { removeSelectedPhoto(); if (logId) { const t = data.find(t => t.id === id.toString()), l = t.logs.find(l => l.id === logId); document.getElementById('newLogDate').value = new Date(l.timestamp - offset).toISOString().slice(0, 16); document.getElementById('newLogMemo').value = l.memo || ""; if (l.image) { currentSelectedPhotoBase64 = l.image; document.getElementById('photoPreview').src = l.image; document.getElementById('photoPreviewContainer').classList.remove('hidden'); } document.getElementById('logSubmitBtn').onclick = updateLog; } else { document.getElementById('newLogDate').value = ds; document.getElementById('newLogMemo').value = ""; document.getElementById('logSubmitBtn').onclick = addLog; } }
            if (type === 'settings') {
                document.getElementById('settingsBirthDate').value = lifePlan.birthDate; document.getElementById('settingsExpectedAge').value = lifePlan.expectedAge;
                const container = document.getElementById('goalRowsContainer'); container.innerHTML = '';
                (lifePlan.goals || []).forEach(g => {
                    const div = document.createElement('div'); div.className = "p-3 bg-slate-100 rounded-xl space-y-2 relative goal-row shadow-sm"; div.dataset.id = g.id;
                    div.innerHTML = `<button onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-slate-400 hover:text-red-500 text-sm">×</button><div class="flex gap-2"><input type="text" value="${g.title}" class="flex-1 border-b border-white py-1 outline-none text-xs bg-transparent font-bold goal-title-input"><input type="text" value="${g.unit}" class="w-16 border-b border-white py-1 outline-none text-xs bg-transparent goal-unit-input"></div><div class="grid grid-cols-3 gap-2"><div><label class="text-[8px] text-slate-400">開始値</label><input type="number" step="any" value="${g.startValue}" class="bg-transparent border-b border-white w-full text-[10px] outline-none goal-start-val-input"></div><div><label class="text-[8px] text-slate-400">現在値</label><input type="number" step="any" value="${g.current}" class="bg-transparent border-b border-white w-full text-[10px] outline-none goal-current-val-input"></div><div><label class="text-[8px] text-slate-400">目標値</label><input type="number" step="any" value="${g.target}" class="bg-transparent border-b border-white w-full text-[10px] outline-none goal-target-val-input"></div></div><div class="grid grid-cols-2 gap-2"><input type="date" value="${g.startDate}" class="bg-transparent text-[10px] goal-start-date-input"><input type="date" value="${g.endDate}" class="bg-transparent text-[10px] goal-end-date-input"></div>`;
                    container.appendChild(div);
                });
            }
        };
        window.closeModal = (type) => { document.getElementById(`${type}Modal`).style.display = 'none'; };
        window.createTimer = async () => { const title = document.getElementById('newTimerTitle').value.trim(); if (!title) return; const nid = Date.now().toString(), nt = { id: nid, title, category: document.getElementById('newTimerCategory').value.trim() || '未分類', color: currentSelectedColor, alertDays: parseInt(document.getElementById('newTimerAlertDays').value) || 0, isExpanded: false, logs: [{ id: Date.now()+1, timestamp: new Date(document.getElementById('newTimerInitialDate').value).getTime(), memo: document.getElementById('newTimerInitialMemo').value.trim() }] }; await setDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'timers', nid), nt); closeModal('timer'); };
        window.updateTimer = async () => { await updateDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'timers', currentEditingTimerId.toString()), { title: document.getElementById('newTimerTitle').value.trim(), category: document.getElementById('newTimerCategory').value.trim() || '未分類', color: currentSelectedColor, alertDays: parseInt(document.getElementById('newTimerAlertDays').value) || 0 }); closeModal('timer'); };
        window.addLog = async () => { const t = data.find(t => t.id === currentEditingTimerId.toString()), logs = [...t.logs, { id: Date.now(), timestamp: new Date(document.getElementById('newLogDate').value).getTime(), memo: document.getElementById('newLogMemo').value.trim(), image: currentSelectedPhotoBase64 }].sort((a,b) => b.timestamp - a.timestamp); await updateDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'timers', t.id), { logs: logs, isExpanded: true }); closeModal('log'); };
        window.updateLog = async () => { const t = data.find(t => t.id === currentEditingTimerId.toString()), logs = t.logs.map(l => l.id === currentEditingLogId ? { ...l, timestamp: new Date(document.getElementById('newLogDate').value).getTime(), memo: document.getElementById('newLogMemo').value.trim(), image: currentSelectedPhotoBase64 } : l).sort((a,b) => b.timestamp - a.timestamp); await updateDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'timers', t.id), { logs: logs, isExpanded: true }); closeModal('log'); };
        window.deleteTimer = (id) => { document.getElementById('deleteTargetName').innerText = "削除"; document.getElementById('deleteModal').style.display = 'flex'; document.getElementById('deleteExecuteBtn').onclick = async () => { await deleteDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'timers', id.toString())); closeModal('delete'); }; };
        window.deleteLog = (timerId, logId) => { document.getElementById('deleteTargetName').innerText = "履歴削除"; document.getElementById('deleteModal').style.display = 'flex'; document.getElementById('deleteExecuteBtn').onclick = async () => { const t = data.find(t => t.id === timerId.toString()), logs = t.logs.filter(l => l.id !== logId); await updateDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'timers', timerId.toString()), { logs }); closeModal('delete'); }; };
        window.toggleExpand = async (id) => { const t = data.find(t => t.id === id.toString()); await updateDoc(doc(db, 'artifacts', currentAppId, 'users', user.uid, 'timers', id.toString()), { isExpanded: !t.isExpanded }); };
        window.filterCategory = (cat) => { selectedCategory = cat; renderCategories(); render(); };
        window.zoomImage = (src) => { document.getElementById('imageModalContent').src = src; document.getElementById('imageModal').style.display = 'flex'; };

        function updateCategoryList() { const cats = [...new Set(data.map(t => t.category))].filter(c => c !== '未分類'); document.getElementById('existingCategories').innerHTML = cats.map(c => `<option value="${c}">`).join(''); }
        function renderCategories() { const cats = ['すべて', ...new Set(data.map(t => t.category))].sort(); document.getElementById('categoryTabs').innerHTML = cats.map(cat => `<button onclick="filterCategory('${cat}')" class="${selectedCategory === cat ? 'bg-slate-800 text-white shadow-md' : 'bg-white text-slate-500 border border-slate-200'} px-3 py-1.5 rounded-full text-[10px] font-bold whitespace-nowrap transition">${cat}</button>`).join(''); }
        
        function render() {
            renderTabs(); renderDashboard();
            const container = document.getElementById('mainContainer'); if(!container) return; container.innerHTML = '';
            let filtered = selectedCategory === 'すべて' ? [...data] : data.filter(t => t.category === selectedCategory);
            filtered.sort((a, b) => {
                const tsA = a.logs[0]?.timestamp || 0, tsB = b.logs[0]?.timestamp || 0, now = Date.now();
                const isFutA = tsA > now, isFutB = tsB > now; if (isFutA && !isFutB) return -1; if (!isFutA && isFutB) return 1; if (isFutA && isFutB) return tsA - tsB; return tsB - tsA; 
            });
            filtered.forEach(timer => {
                const latest = timer.logs[0], rel = latest ? formatRelativeTime(latest.timestamp) : null;
                let alerting = false; if (rel && timer.alertDays > 0) { if ((rel.isFuture && rel.totalDays <= timer.alertDays) || (!rel.isFuture && rel.totalDays >= timer.alertDays)) alerting = true; }
                let col = 'bg-white border-slate-300';
                if (timer.color && timer.color !== 'default') { const p = { white: 'bg-white border-slate-300', indigo: 'bg-indigo-100 border-indigo-300', orange: 'bg-orange-100 border-orange-300', emerald: 'bg-emerald-100 border-emerald-300', rose: 'bg-rose-100 border-rose-300' }; col = p[timer.color] || col; }
                else if (rel) col = rel.isFuture ? 'bg-orange-100 border-orange-300' : 'bg-indigo-100 border-indigo-300';

                const card = document.createElement('div'); card.className = `rounded-2xl shadow-md border overflow-hidden transition-all ${col} ${alerting ? 'ring-2 ring-red-500' : ''}`;
                let timeline = '';
                if (timer.isExpanded && timer.logs.length > 0) {
                    timeline = `<div class="px-6 pb-6 pt-2 space-y-4 relative"><div class="timeline-line"></div>${timer.logs.map((log, idx) => {
                        const r = formatRelativeTime(log.timestamp);
                        return `<div class="relative pl-8 group"><div class="timeline-dot"></div><div class="flex justify-between items-start"><div class="flex-1" onclick="event.stopPropagation(); openModal('log', '${timer.id}', ${log.id})"><div class="flex items-center gap-2 mb-1"><span class="text-[9px] font-black px-1.5 py-0.5 rounded shadow-sm ${r.isFuture ? 'bg-orange-600' : 'bg-indigo-800'} text-white">${r.actionLabel}</span><span class="text-[9px] text-slate-500 font-bold">${new Date(log.timestamp).toLocaleDateString()}</span></div>${log.memo ? `<p class="text-[10px] text-slate-700 mt-1 bg-white/40 p-1.5 rounded leading-relaxed">${log.memo.replace(/\n/g, '<br>')}</p>` : ''}${log.image ? `<img src="${log.image}" onclick="event.stopPropagation(); zoomImage('${log.image}')" class="mt-1 w-20 h-20 object-cover rounded shadow-sm hover:scale-105 transition cursor-zoom-in">` : ''}</div><button onclick="event.stopPropagation(); deleteLog('${timer.id}', ${log.id})" class="p-1.5 text-red-400 bg-white/80 hover:bg-red-500 hover:text-white rounded-lg transition-all ml-1 shadow-sm"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button></div></div>`;
                    }).join('')}</div>`;
                }
                const bCol = rel ? (alerting ? 'bg-red-600 text-white animate-pulse' : (rel.isFuture ? 'bg-orange-600 text-white' : 'bg-indigo-800 text-white')) : '';
                card.innerHTML = `<div class="py-2.5 px-4 flex items-center justify-between cursor-pointer hover:bg-white/10" onclick="toggleExpand('${timer.id}')"><div class="flex-1 min-w-0 mr-3"><div class="flex items-center gap-1.5 mb-0.5"><span class="text-[8px] font-black uppercase px-1.5 py-0.5 bg-white/80 text-slate-500 rounded border border-slate-300">${timer.category}</span>${rel ? `<span class="text-[9px] font-black px-1.5 py-0.5 rounded shadow-md ${bCol} mono">${rel.actionLabel}</span>` : ''}</div><h2 class="text-base font-bold text-slate-800 truncate">${timer.title} <span class="text-xs font-normal text-slate-400">(${timer.logs.length})</span></h2></div><div class="flex items-center gap-2" onclick="event.stopPropagation()"><button onclick="openModal('timer', '${timer.id}')" class="p-1.5 text-slate-500 bg-white/60 hover:text-sky-700 rounded-lg shadow-sm border border-white/80"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg></button><button onclick="deleteTimer('${timer.id}')" class="p-1.5 text-red-500 bg-white/60 hover:bg-red-600 hover:text-white rounded-lg shadow-sm border border-red-100"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button><button onclick="openModal('log', '${timer.id}')" class="w-10 h-10 bg-white text-sky-600 rounded-full flex items-center justify-center hover:bg-sky-500 hover:text-white transition shadow-lg border border-sky-100"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M12 4v16m8-8H4"/></svg></button></div></div>${timeline}`;
                container.appendChild(card);
            });
        }
        setInterval(() => render(), 1000); 
    </script>
</body>
</html>
